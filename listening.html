<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BE10 Listening Test — 完整模拟考</title>
<style>
  :root{
    --purple:#51247a; --purple-light:#962a8b; --bg:#f6f4f9; --card:#fff;
    --text:#2b2b2b; --muted:#6b6b7b; --green:#1e7d45; --red:#c0392b;
    --amber:#b45309; --hl:#ffe066; --line:#e4dff0;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.65;}
  .topbar{position:sticky;top:0;z-index:50;background:var(--purple);color:#fff;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:9px 20px;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .topbar .t1{font-weight:700;font-size:14.5px;}
  .topbar .t2{font-size:12.5px;opacity:.85;}
  .timer{font-variant-numeric:tabular-nums;font-size:22px;font-weight:700;
    background:rgba(255,255,255,.14);padding:2px 14px;border-radius:8px;min-width:96px;text-align:center;}
  .container{max-width:1000px;margin:0 auto;padding:22px 18px 90px;}
  .card{background:var(--card);border-radius:12px;padding:22px 26px;margin-bottom:18px;
    box-shadow:0 1px 4px rgba(60,40,90,.08);}
  h1{color:var(--purple);font-size:23px;margin:0 0 6px;}
  h2{color:var(--purple);font-size:19px;margin:0 0 12px;}
  h3{font-size:16px;margin:18px 0 8px;color:var(--purple-light);}
  .muted{color:var(--muted);font-size:14px;}
  .hidden{display:none!important;}
  button.primary{background:var(--purple);color:#fff;border:none;padding:12px 30px;
    font-size:16px;font-weight:600;border-radius:8px;cursor:pointer;}
  button.primary:hover{background:var(--purple-light);}
  button.ghost{background:transparent;color:var(--purple);border:1.5px solid var(--purple);
    padding:9px 20px;font-size:14.5px;border-radius:8px;cursor:pointer;}
  button.ghost:hover{background:#f0eaf7;}
  .test-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:680px){.test-cards{grid-template-columns:1fr;}}
  .test-card{border:1.5px solid var(--line);border-radius:12px;padding:20px;cursor:pointer;transition:.15s;}
  .test-card:hover{border-color:var(--purple);box-shadow:0 4px 14px rgba(81,36,122,.14);transform:translateY(-2px);}
  .test-card h3{margin:0 0 8px;color:var(--purple);font-size:18px;}
  .test-card ul{margin:6px 0 0;padding-left:18px;font-size:13.5px;color:var(--muted);}
  .stage-progress{display:flex;gap:6px;align-items:center;}
  .dot{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
  .dot.active{background:#fff;color:var(--purple);}
  .dot.done{background:#8f6db3;}
  /* audio player */
  .audio-box{background:linear-gradient(135deg,#5a2a86,#8a3fa0);color:#fff;border-radius:12px;
    padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .audio-box .ai{font-size:26px;}
  .audio-box .info{flex:1;min-width:180px;font-size:13.5px;opacity:.95;}
  .play-btn{background:#fff;color:var(--purple);border:none;padding:11px 24px;font-size:15px;
    font-weight:700;border-radius:30px;cursor:pointer;white-space:nowrap;}
  .play-btn:disabled{opacity:.7;cursor:default;}
  /* questions */
  .q-block{padding:16px 0;border-bottom:1px solid var(--line);}
  .q-block:last-child{border-bottom:none;}
  .q-num{font-weight:700;color:var(--purple);}
  .q-ctx{font-style:italic;color:var(--muted);margin:2px 0 4px;}
  .q-stem{font-weight:600;margin:0 0 10px;}
  .opt{display:block;padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:7px;cursor:pointer;}
  .opt:hover{border-color:var(--purple-light);background:#faf7fd;}
  .opt input{margin-right:9px;}
  .opt.sel{border-color:var(--purple);background:#f3ecfa;}
  .grid2{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start;}
  @media(max-width:820px){.grid2{grid-template-columns:1fr;}}
  .box-list{list-style:none;padding:0;margin:0;}
  .box-list li{padding:6px 10px;border-radius:6px;margin-bottom:2px;font-size:14px;}
  .box-list li:nth-child(odd){background:#faf8fd;}
  .box-list b{color:var(--purple);}
  .match-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .match-row label{flex:1;font-size:14.5px;}
  .match-row select{padding:6px 9px;font-size:14px;border:1.5px solid #ccc;border-radius:6px;background:#fff;min-width:70px;}
  .match-row select.dup{border-color:var(--amber);background:#fff7ea;}
  .dup-warn{color:var(--amber);font-size:13px;margin-top:4px;}
  .opt4{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .opt4 label{border:1.5px solid #ddd;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13.5px;}
  .opt4 label:hover{border-color:var(--purple-light);background:#faf7fd;}
  .opt4 label.sel{border-color:var(--purple);background:#f3ecfa;}
  .opt4 input{margin-right:6px;}
  .chk{display:block;padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:7px;cursor:pointer;}
  .chk:hover{border-color:var(--purple-light);background:#faf7fd;}
  .chk.sel{border-color:var(--purple);background:#f3ecfa;}
  .chk input{margin-right:9px;}
  /* highlight */
  .highlightable{cursor:text;}
  mark.hl{background:var(--hl);padding:0 1px;border-radius:2px;cursor:pointer;}
  mark.hl:hover{background:#ffd43b;}
  #hlBtn{position:absolute;z-index:99;background:#333;color:#fff;border:none;padding:5px 12px;
    border-radius:6px;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .hl-tip{font-size:13px;color:var(--muted);margin:6px 0 0;}
  /* results */
  .score-big{font-size:48px;font-weight:800;color:var(--purple);text-align:center;line-height:1.1;}
  .stage-scores{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;}
  .ss{background:#f3ecfa;border-radius:10px;padding:8px 16px;text-align:center;min-width:92px;}
  .ss b{display:block;color:var(--purple);font-size:20px;}
  .ss span{font-size:12.5px;color:var(--muted);}
  table.results{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px;}
  table.results th,table.results td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;}
  table.results th{background:#f2edf9;color:var(--purple);}
  .ok{color:var(--green);font-weight:700;}
  .bad{color:var(--red);font-weight:700;}
  .center{text-align:center;}
  .tr-line{margin:2px 0;font-size:14px;}
  .tr-line .sp{font-weight:700;color:var(--purple);margin-right:6px;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="t1" id="tbTitle">BE10 Listening Test — 完整模拟考</div>
    <div class="t2" id="tbSub">选择一套试卷开始</div>
  </div>
  <div class="stage-progress hidden" id="stageProgress"></div>
  <div class="timer hidden" id="timer">00:00</div>
</div>

<button id="hlBtn" class="hidden">🖍 高亮</button>

<div class="container" id="app"></div>

<script>
/* ============================================================
   听力题库：LISTEN_TESTS[0]=真题卷, [1]=原创练习卷
   录音以文字原文(transcript)给出，用浏览器语音朗读，仅播一次。
   who: N=旁白, M=男, W=女
   ============================================================ */
const LISTEN_TESTS = [
/* ==================== 真题卷 ==================== */
{
  name:"Listening Test 1（真题）",
  topics:"八情景 · 海滨城市演讲 · 湿地开发之争 · 大坝与水安全",
  stage1:{
    intro:"你会听到八个情景中的对话或独白。第 1–10 题，从 A、B、C 中选出最佳答案。",
    transcript:[
      {who:"N",text:"Stage one. You will hear people talking in eight different situations."},
      {who:"N",text:"Question one. You overhear two students discussing a reading project they did with young children."},
      {who:"M",text:"So did you like working with the little kids, reading with them and everything? The books we chose for them from our library went down a storm, didn't they? Especially the bits we read out loud."},
      {who:"W",text:"Yeah, though I wondered if the really little ones could hear properly - it's such a big space. It was good fun, though."},
      {who:"M",text:"Like when we started giving away the gifts we'd brought them."},
      {who:"W",text:"It's a pity the weather wasn't good - we should've been out in the sunshine. That room's meant to hold the whole school - about six hundred kids."},
      {who:"M",text:"Well, at least we got out to play football with them in the break."},
      {who:"N",text:"Question two. You hear an office manager talking about her work."},
      {who:"W",text:"You know how it is, as soon as you've finished one project, you have to get started on something else, and it's often something completely different. I don't find that a problem though, and I enjoy the fact that I can get it done effectively - after all, I've been in this job for a long time so I think I can say I know what I'm doing! I wish that was true of the people I'm working with - I reckon if I didn't keep checking, they'd never get on with things! Though I guess I'm not feeling very motivated about this project either."},
      {who:"N",text:"Question three. You hear part of a radio programme."},
      {who:"W",text:"I think lots of people will be interested in finding out more about it. It's a great way of seeing all the plants and trees that thrive in this area, and in spring it's spectacular! Teachers who want to encourage their students to protect the environment should take them - after all there's nothing like experiencing something for yourself to make you value it. We've made sure it's as accessible as possible, and hope it'll be popular with people of all ages. If you want more information, the details are all online. There's no excuse not to get out there and try it!"},
      {who:"N",text:"Question four. You hear a girl talking about a psychology textbook."},
      {who:"W",text:"Well I was quite excited when I finally found this psychology book, because I need it for my assignment. It was hardly cheap, and I know I could get a lot of the information in it for free online, but I still think it was worth getting my own copy of it. It has such clear explanations, I probably won't find anything else as useful. Some books like this can turn out to be pretty boring, I know, but I just don't believe this one will. And it's no more expensive than any of the other coursebooks I have to buy."},
      {who:"N",text:"Question five. You hear two people talking about a country walk they're doing."},
      {who:"M",text:"Are you feeling tired?"},
      {who:"W",text:"No, I'm fine, just stopping to look at the scenery. It's beautiful, isn't it?"},
      {who:"M",text:"Fabulous, but keep moving - it's too cold to stand still."},
      {who:"W",text:"Well, we knew that when we set off. The forecast's better for tomorrow. I did say we should wait."},
      {who:"M",text:"Sorry, I know, but let's carry on because there's only another five kilometres to go. Right or left here?"},
      {who:"W",text:"Left, I think, according to the map. Five kilometres you said? It'll be just about dark when we get to the end."},
      {who:"M",text:"If we do get there! I'm only joking!"},
      {who:"N",text:"Question six. You hear a swimmer talking about a competition she took part in."},
      {who:"W",text:"I had such a good time at the championships, better than I expected. The atmosphere was incredible with everyone cheering. I didn't expect so many people to turn up to the event, though I don't suppose they were there to see me. I hadn't been too happy with my performance in the previous competition, so to turn things round like that was very satisfying. The pressure started to get to me at one point, but I had a talk with myself and got things into perspective. I must work on my nerves before the next big event, but I can't wait to get back in the pool and start training for it."},
      {who:"N",text:"Question seven. You hear two friends talking about a popular television programme."},
      {who:"M",text:"Did you watch that programme last night on Channel Two?"},
      {who:"W",text:"Yeah. It's hard to believe Helen Jenkins is seventy-five years old, isn't it? Most people give up work well before then and she still seems to be on TV all the time!"},
      {who:"M",text:"I know! I think it's because she's such a good communicator and she's come into her own, hasn't she, with the move away from complicated cuisine towards the simple, budget-friendly family stuff. It's very much in keeping with the times, isn't it?"},
      {who:"W",text:"Yes, but I still haven't learnt to do it myself."},
      {who:"N",text:"Question eight. You hear two people talking about a place they have visited."},
      {who:"W",text:"I loved the architecture, didn't you?"},
      {who:"M",text:"Yeah, it was so unusual - I mean when you think of what's being put up in cities nowadays, you know, all the shopping centres and places, then you wonder whether anyone actually bothers to design buildings like that anymore."},
      {who:"W",text:"That's right, and it's just so quiet and peaceful in there - you could really take time to look at all the objects on display. I loved those rare fifteenth-century books! So different from anything you could ever buy."},
      {who:"M",text:"Yeah, me too. I'm going to read up on those now, in fact. There'll be something about them on the internet, or maybe a book I can borrow."},
      {who:"N",text:"Question nine. You hear a lecturer talking to some of his students about their history project."},
      {who:"M",text:"Well the deadline's not for a while yet, so there's plenty of time for you to choose your topic for your nineteenth-century history project and read up on it. There's been a lot written on this period that you'll find useful I'm sure. Books are a great source of information, as well as the internet of course, but check your facts carefully and use reliable websites. Also make sure you come and see me if there's anything that's unclear or you think I can help you with. Straight after a lecture is a good time to catch me. And finally, good luck, everybody!"},
      {who:"N",text:"Question ten. You hear part of a radio programme in which a teacher is talking about her own education."},
      {who:"W",text:"I was educated in quite a posh and rather expensive school, really, so expectations for pupils were high, and that put us under pressure a bit. Mind you, I wouldn't have got down to it and done much otherwise, and certainly wouldn't have gone to university. Perhaps that's why I've found my niche in trying to make sure that everyone gets the kind of education that allows them to realise their full potential in life. Teaching wasn't my first career choice, though. I think colleagues I worked with were amazed when I made the switch from industry. But I haven't looked back since I did it."}
    ],
    questions:[
      {ctx:"You overhear two students discussing a reading project they did with young children.",q:"What do they agree about it?",options:{A:"The venue was perfect.",B:"The material was well received.",C:"The number of participants was surprising."},answer:"B",explain:"男生说选的书「went down a storm」（大受欢迎）= material well received。A 场地：女生嫌空间太大、小孩听不清，并非完美；C 只提到房间能容约 600 人，并非「surprising」。"},
      {ctx:"You hear an office manager talking about her work.",q:"How does she feel about it?",options:{A:"confident that she can do it well",B:"interested in her new project",C:"satisfied with her staff"},answer:"A",explain:"「I know what I'm doing / get it done effectively」= 自信能做好。B 与「not feeling very motivated about this project」相反；C「wish that was true of the people... keep checking」表明对同事并不满意。"},
      {ctx:"You hear part of a radio programme.",q:"What is the woman talking about?",options:{A:"an environment group",B:"a nature course for school children",C:"a new walking route in the countryside"},answer:"C",explain:"看植物树木、「get out there and try it」、accessible、适合 all ages = 一条乡间步道。A 不是「团体」；B 不只针对学生（for all ages）。"},
      {ctx:"You hear a girl talking about a psychology textbook.",q:"What does she say about it?",options:{A:"It is not very interesting.",B:"It is good value for money.",C:"It is going to come in useful."},answer:"C",explain:"「need it for my assignment / clear explanations / won't find anything else as useful」= 会很有用。A 与「don't believe this one will [be boring]」相反；B 她说「hardly cheap」，并未强调超值。"},
      {ctx:"You hear two people talking about a country walk they're doing.",q:"What do they agree about?",options:{A:"It's much too long to complete.",B:"The path is very difficult to follow.",C:"They've chosen the wrong day to do it."},answer:"C",explain:"女：「forecast's better for tomorrow, I did say we should wait」，男：「Sorry, I know」（认同）= 选错了日子。A 只剩 5km，能走完；B 只是随口看地图，非难走。"},
      {ctx:"You hear a swimmer talking about a competition she took part in.",q:"How does she feel about it?",options:{A:"disappointed with her result",B:"excited about where it will lead",C:"surprised by the support she received"},answer:"B",explain:"「can't wait to get back in the pool and start training for [the next big event]」= 期待接下来的发展。A 结果「very satisfying」非失望；C 观众虽多，但她说「I don't suppose they were there to see me」，并非对她的支持。"},
      {ctx:"You hear two friends talking about a popular television programme.",q:"What is the programme about?",options:{A:"retirement",B:"cookery",C:"teaching"},answer:"B",explain:"「cuisine / budget-friendly family stuff / haven't learnt to do it myself」= 烹饪。A 退休、C 教学（good communicator）都是干扰。"},
      {ctx:"You hear two people talking about a place they have visited.",q:"What kind of place is it?",options:{A:"a museum",B:"a library",C:"a shop"},answer:"A",explain:"「objects on display / rare fifteenth-century books / different from anything you could ever buy」= 展品陈列 = 博物馆。B 图书馆、C 商店都是干扰（书 / buy）。"},
      {ctx:"You hear a lecturer talking to some of his students about their history project.",q:"What is he doing?",options:{A:"encouraging them to ask him questions about it",B:"recommending some books that will help with it",C:"advising them on how to organise their time"},answer:"A",explain:"「come and see me if there's anything unclear / catch me after a lecture」= 鼓励他们来提问。B 未推荐具体书目；C 只说「时间充裕」，并未教如何安排时间。"},
      {ctx:"You hear part of a radio programme in which a teacher is talking about her own education.",q:"Why did she become a teacher?",options:{A:"She enjoyed her own time at school very much.",B:"She was encouraged to do so by colleagues.",C:"She wanted others to have the same opportunities as her."},answer:"C",explain:"「make sure everyone gets the kind of education that allows them to realise their full potential」= 想让别人拥有和她一样的机会（她上了大学）。A 学校让她「under pressure」，非「很享受」；B 同事是「amazed」而非鼓励。"}
    ]
  },
  stage2:{
    intro:"你会听到两名城市规划学生讨论关于「海滨城市」的演讲。他们对演讲每个部分做了什么决定？从 A–G 中为 5 个部分各选一个（有 2 个不用）。",
    transcript:[
      {who:"N",text:"Stage two. You will hear two urban planning students discussing their presentation on cities built by the sea."},
      {who:"W",text:"So I think we've probably got enough for our presentation. It's only fifteen minutes."},
      {who:"M",text:"OK. So I suppose we'll begin with some general historical background about why coastal cities were established. But we don't want to spend too long on that, the other students will already know a bit about it. It's all to do with communications and so on."},
      {who:"W",text:"Yes. We should mention some geographical factors, things like wetlands and river estuaries and coastal erosion and so on. We could have some maps of different cities with these features marked."},
      {who:"M",text:"On a handout you mean? Or some slides everyone can see?"},
      {who:"W",text:"Yeah, that'd be better."},
      {who:"M",text:"It'd be good to go into past mistakes in a bit more detail. Did you read that case study of the problems there were in New Orleans with flooding a few years ago?"},
      {who:"W",text:"Yes. We could use that as the basis for that part of the talk. I don't think the other students will have read it, but they'll remember hearing about the flooding at the time."},
      {who:"M",text:"OK. So that's probably enough background."},
      {who:"W",text:"So then we'll go on to talk about what action's being taken to deal with the problems of coastal cities."},
      {who:"M",text:"OK. What else do we need to talk about? Maybe something on future risks, looking more at the long term, if populations continue to grow."},
      {who:"W",text:"Yeah. We'll need to do a bit of work there, I haven't got much information, have you?"},
      {who:"M",text:"No. We'll need to look at some websites. Shouldn't take too long."},
      {who:"W",text:"OK. And I think we should end by talking about international implications. Maybe we could ask people in the audience. We've got people from quite a lot of different places."},
      {who:"M",text:"That'd be interesting, if we have time, yes."}
    ],
    parts:[
      {n:1,label:"Historical background"},
      {n:2,label:"Geographical factors"},
      {n:3,label:"Past mistakes"},
      {n:4,label:"Future risks"},
      {n:5,label:"International implications"}
    ],
    decisions:{A:"Use visuals",B:"Keep it short",C:"Involve other students",D:"Check the information is accurate",E:"Provide a handout",F:"Focus on one example",G:"Do online research"},
    answers:{1:"B",2:"A",3:"F",4:"G",5:"C"},
    explanations:{
      1:"「we don't want to spend too long on that」= Keep it short (B)。",
      2:"「maps... slides everyone can see」= Use visuals (A)。",
      3:"以 New Orleans 洪水案例为基础 = Focus on one example (F)。",
      4:"「haven't got much information... look at some websites」= Do online research (G)。",
      5:"「ask people in the audience... from different places」= Involve other students (C)。"
    },
    unused:["D","E"],
    unusedNote:"未用 D（检查信息准确）、E（发讲义——被否决，改用大家都能看的幻灯片）。"
  },
  stage3:{
    intro:"你会听到一男一女讨论一个开发项目是否该进行。判断下面 6 句各符合谁的观点。",
    transcript:[
      {who:"N",text:"Stage three. You will hear a man and a woman discussing whether a development project should go ahead."},
      {who:"M",text:"Hi Kay. Did you see the article in the paper this morning about the proposed wetlands development near the harbour?"},
      {who:"W",text:"You mean the massive project with high-rise apartments, shops and restaurants to be built on reclaimed land?"},
      {who:"M",text:"Yeah. It sounds like an exciting development. The area's booming and we're going to have to find solutions for the lack of accommodation in this area."},
      {who:"W",text:"That's certainly a problem we have to address."},
      {who:"M",text:"What do you think about the location of the site that's been chosen?"},
      {who:"W",text:"Well, for starters, with climate change and rising sea levels, building on the shoreline is risky. Flooding in the near future is a real possibility."},
      {who:"M",text:"I'm sure the developers have considered that and included measures to counteract any climate-related risks."},
      {who:"W",text:"In the long run, though, it'll be the taxpayers footing the bill for sea walls and flood defences if those measures fall short."},
      {who:"M",text:"Let's not be too negative. Think of the benefits - upgrades to the ferry terminal, more business for local shops and a boost to tourism."},
      {who:"W",text:"But a development of this scale will also bring more traffic congestion, and at least a decade of disruptive construction. We can do without all that."},
      {who:"M",text:"Well, that's the price of progress. You can't have development without some short-term inconvenience."},
      {who:"W",text:"I read that the wetlands are home to endangered wildlife such as the Eastern Curlew and other migratory birds. Their populations could decline due to habitat loss."},
      {who:"M",text:"The effects of development won't be as serious as suggested. The development covers only 0.02% of the wetlands so its impact would be fairly minimal."},
      {who:"W",text:"That's misleading. Part of the area to be reclaimed for the project is used by juvenile curlews that don't really have any other options elsewhere. The percentage is irrelevant if the habitat that's going to be destroyed is a crucial part of the bird's life cycle."},
      {who:"M",text:"Perhaps the developers could adjust their plans to avoid the most sensitive areas."},
      {who:"W",text:"My other concern is that the site is actually protected for migratory birds under an international agreement."},
      {who:"M",text:"I did read somewhere that Australia is a signatory to the Ramsar Convention and is obliged under the agreement to conserve our wetland."},

  let re=/./;
  if(g==="M") re=/(male|daniel|arthur|george|fred|alex|guy|aaron|Google UK English Male|David|Mark)/i;
  else if(g==="W") re=/(female|samantha|kate|serena|victoria|karen|moira|tessa|fiona|Google UK English Female|Zira|Hazel|Susan)/i;
  return pool.find(v=>re.test(v.name))||pool[0]||null;
}
function stopAudio(){ try{window.speechSynthesis.cancel();}catch(e){} }
function speakLines(lines,onEnd){
  if(!window.speechSynthesis){ alert("你的浏览器不支持语音朗读，请换用 Chrome / Safari。"); if(onEnd)onEnd(); return; }
  stopAudio();
  lines.forEach((ln,i)=>{
    const u=new SpeechSynthesisUtterance(ln.text);
    const v=pickVoice(ln.who); if(v)u.voice=v;
    u.lang=(v&&v.lang)||"en-GB";
    u.rate=0.95;
    u.pitch = ln.who==="M"?0.85:(ln.who==="W"?1.15:1.0);
    if(i===lines.length-1 && onEnd) u.onend=onEnd;
    window.speechSynthesis.speak(u);
  });
}
function playOnce(key,btn,lines){
  if(playedSet.has(key))return;
  playedSet.add(key);
  btn.disabled=true; btn.textContent="🔊 录音播放中…（仅此一次）";
  speakLines(lines,()=>{ btn.textContent="✓ 录音已播放完毕"; });
}
function audioBox(stKey,lines){
  const key=testIndex+"-"+stKey;
  const done=playedSet.has(key);
  return `<div class="audio-box">
    <div class="ai">🎧</div>
    <div class="info"><b>录音 · 仅播放一次</b><br>先花点时间看清题目，准备好后再点播放。播放后无法重听（与真实考试一致）。</div>
    <button class="play-btn" ${done?"disabled":""} onclick="playOnce('${key}',this,LISTEN_TESTS[${testIndex}].${stKey}.transcript)">${done?"✓ 已播放":"▶ 播放录音"}</button>
  </div>`;
}

/* ==================== 计时（正计时，仅参考）==================== */
function startSW(){ clearInterval(swInterval); swSec=0; renderSW(); $("timer").classList.remove("hidden");
  swInterval=setInterval(()=>{swSec++;renderSW();},1000); }
function renderSW(){ const m=Math.floor(swSec/60),s=swSec%60; $("timer").textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`; }
function stopSW(){ clearInterval(swInterval); $("timer").classList.add("hidden"); }

/* ==================== 进度 ==================== */
function renderProgress(){
  const sp=$("stageProgress"); sp.classList.remove("hidden");
  sp.innerHTML=[1,2,3,4].map((n,i)=>{let c="dot";if(i<stageIdx)c+=" done";if(i===stageIdx)c+=" active";
    return `<div class="${c}">${i<stageIdx?"✓":n}</div>`;}).join("");
}

/* ==================== 首页 ==================== */
function renderHome(){
  stopSW(); stopAudio(); $("stageProgress").classList.add("hidden");
  $("tbTitle").textContent="BE10 Listening Test — 完整模拟考";
  $("tbSub").textContent="选择一套试卷开始";
  const cards=LISTEN_TESTS.map((t,i)=>`
    <div class="test-card" onclick="startTest(${i})">
      <h3>${t.name}</h3>
      <div class="muted" style="font-size:13px">${t.topics}</div>
      <ul>
        <li>Stage 1 三选一 · 10 题</li>
        <li>Stage 2 部分配决定 · 5 题</li>
        <li>Stage 3 观点归属 · 6 题</li>
        <li>Stage 4 多选 · 3 题</li>
      </ul>
      <p style="margin:14px 0 0"><button class="primary" style="width:100%">开始 ▶</button></p>
    </div>`).join("");
  app().innerHTML=`
    <div class="card">
      <h1>BE10 Listening 完整模拟考</h1>
      <p class="muted">两套试卷，各含 4 个 Stage。每个 Stage 有一段录音，<b>只能播放一次</b>；题目全程可用鼠标选中 🖍 高亮。做完给出总分与逐题解析。共 24 题。</p>
      <div style="background:#faf8fd;border-radius:10px;padding:14px 18px;margin:14px 0;font-size:14px">
        <b style="color:var(--purple)">🎧 关于录音</b>：本文档提供的是听力原文，网页用浏览器内置语音朗读（对话男女不同声音）。<b>建议用 Chrome 或 Safari</b>，并把音量打开。首次点播放前请确保设备不是静音。
      </div>
      <div class="test-cards">${cards}</div>
    </div>`;
}
function startTest(i){ testIndex=i; stageIdx=0; responses={}; $("tbTitle").textContent=LISTEN_TESTS[i].name; runStage(); }

/* ==================== 运行 Stage ==================== */
function runStage(){
  stopAudio();
  const key=STAGE_KEYS[stageIdx]; renderProgress(); $("tbSub").textContent=STAGE_NAMES[key];
  const st=LISTEN_TESTS[testIndex][key];
  if(key==="stage1")renderStage1(st);
  else if(key==="stage2")renderStage2(st);
  else if(key==="stage3")renderStage3(st);
  else renderStage4(st);
  startSW(); window.scrollTo(0,0);
}
function nextBtn(){ return `<div class="card center">
  <button class="primary" onclick="submitStage()">提交本部分并继续 ✓</button>
  <div class="muted" style="margin-top:8px">未作答的题会记为错。</div></div>`; }

/* ---------- Stage 1 ---------- */
function renderStage1(st){
  const qs=st.questions.map((q,idx)=>{
    const opts=Object.entries(q.options).map(([k,v])=>`
      <label class="opt" data-q="${idx}" data-v="${k}">
        <input type="radio" name="s1q${idx}" value="${k}" onchange="selOpt('.opt',${idx},'${k}')">
        <b>${k}.</b> ${v}</label>`).join("");
    return `<div class="q-block">
      <div class="q-stem"><span class="q-num">Question ${idx+1}.</span></div>
      <div class="q-ctx">${q.ctx}</div>
      <div class="q-stem">${q.q}</div>${opts}</div>`;
  }).join("");
  app().innerHTML=`
    <div class="card"><h2>${STAGE_NAMES.stage1}</h2><p class="muted">${st.intro}</p>
      <p class="hl-tip">🖍 可选中文字高亮关键词。</p></div>
    ${audioBox("stage1",st.transcript)}
    <div class="card highlightable">${qs}</div>
    ${nextBtn()}`;
}
function selOpt(sel,idx,k){ document.querySelectorAll(`${sel}[data-q="${idx}"]`).forEach(o=>o.classList.toggle("sel",o.dataset.v===k)); }

/* ---------- Stage 2 ---------- */
function renderStage2(st){
  const rows=st.parts.map(p=>`
    <div class="match-row">
      <label>${p.n}. ${p.label}</label>
      <select data-part="${p.n}" onchange="checkDup('#s2rows')">
        <option value="">?</option>
        ${Object.keys(st.decisions).map(k=>`<option value="${k}">${k}</option>`).join("")}
      </select></div>`).join("");
  const box=Object.entries(st.decisions).map(([k,v])=>`<li><b>${k}.</b> ${v}</li>`).join("");
  app().innerHTML=`
    <div class="card"><h2>${STAGE_NAMES.stage2}</h2><p class="muted">${st.intro}</p>
      <p class="hl-tip">🖍 可选中文字高亮关键词。</p></div>
    ${audioBox("stage2",st.transcript)}
    <div class="grid2">
      <div class="card highlightable">
        <h3 style="margin-top:0">演讲的各部分</h3>
        <div id="s2rows">${rows}</div>
        <div class="dup-warn hidden" id="s2dup">⚠️ 有决定被重复使用（每个决定只能用一次）</div>
      </div>
      <div class="card highlightable" style="background:#faf8fd">
        <h3 style="margin-top:0">Decisions（A–G）</h3>
        <ul class="box-list">${box}</ul>
      </div>
    </div>
    ${nextBtn()}`;
}
function checkDup(scope){
  const sels=document.querySelectorAll(`${scope} select`); const c={}; let dup=false;
  sels.forEach(s=>{if(s.value)c[s.value]=(c[s.value]||0)+1;});
  sels.forEach(s=>{const d=s.value&&c[s.value]>1;s.classList.toggle("dup",d);if(d)dup=true;});
  const w=$("s2dup"); if(w)w.classList.toggle("hidden",!dup);
}

/* ---------- Stage 3 ---------- */
function renderStage3(st){
  const rows=st.statements.map((s,i)=>{
    const opts=st.options4.map((o,oi)=>`
      <label class="o4opt" data-s="${i}" data-v="${oi}">
        <input type="radio" name="s3q${i}" value="${oi}" onchange="selOpt('.o4opt',${i},'${oi}')">${o}</label>`).join("");
    return `<div class="q-block">
      <div class="q-stem"><span class="q-num">${i+1}.</span> ${s.text}</div>
      <div class="opt4">${opts}</div></div>`;
  }).join("");
  app().innerHTML=`
    <div class="card"><h2>${STAGE_NAMES.stage3}</h2><p class="muted">${st.intro}</p>
      <p class="hl-tip">🖍 可选中文字高亮关键词。</p></div>
    ${audioBox("stage3",st.transcript)}
    <div class="card highlightable">${rows}</div>
    ${nextBtn()}`;
}

/* ---------- Stage 4 ---------- */
function renderStage4(st){
  const qs=st.questions.map((q,idx)=>{
    const opts=Object.entries(q.options).map(([k,v])=>`
      <label class="chk" data-q="${idx}" data-v="${k}">
        <input type="checkbox" value="${k}" onchange="toggleChk(${idx},'${k}')">
        <b>${k}.</b> ${v}</label>`).join("");
    return `<div class="q-block">
      <div class="q-stem"><span class="q-num">Question ${idx+1}.</span> ${q.q}</div>
      <div class="muted" style="margin-bottom:6px">选择所有正确项（可能不止一个）。</div>${opts}</div>`;
  }).join("");
  app().innerHTML=`
    <div class="card"><h2>${STAGE_NAMES.stage4}</h2><p class="muted">${st.intro}</p>
      <p class="hl-tip">🖍 可选中文字高亮关键词。</p></div>
    ${audioBox("stage4",st.transcript)}
    <div class="card highlightable">${qs}</div>
    ${nextBtn()}`;
}
function toggleChk(idx,k){
  const lab=document.querySelector(`.chk[data-q="${idx}"][data-v="${k}"]`);
  const inp=lab.querySelector("input"); lab.classList.toggle("sel",inp.checked);
}

/* ==================== 收集 & 推进 ==================== */
function collectStage(){
  const key=STAGE_KEYS[stageIdx];
  if(key==="stage1"){ const a={};
    LISTEN_TESTS[testIndex].stage1.questions.forEach((q,i)=>{const c=document.querySelector(`input[name="s1q${i}"]:checked`);a[i]=c?c.value:"";});
    responses.stage1=a;
  }else if(key==="stage2"){ const a={};
    document.querySelectorAll('#s2rows select').forEach(s=>a[s.dataset.part]=s.value); responses.stage2=a;
  }else if(key==="stage3"){ const a={};
    LISTEN_TESTS[testIndex].stage3.statements.forEach((s,i)=>{const c=document.querySelector(`input[name="s3q${i}"]:checked`);a[i]=c?parseInt(c.value):-1;});
    responses.stage3=a;
  }else{ const a={};
    LISTEN_TESTS[testIndex].stage4.questions.forEach((q,i)=>{
      a[i]=[...document.querySelectorAll(`.chk[data-q="${i}"] input:checked`)].map(x=>x.value);});
    responses.stage4=a;
  }
}
function submitStage(){ collectStage(); stopAudio(); stageIdx++;
  if(stageIdx<4)runStage(); else { stopSW(); renderResults(); } }

/* ==================== 结果 ==================== */
function arrEq(a,b){ if(a.length!==b.length)return false; const s=[...b].sort(); return [...a].sort().every((x,i)=>x===s[i]); }
function renderResults(){
  const T=LISTEN_TESTS[testIndex];
  stopAudio(); $("stageProgress").classList.add("hidden"); $("tbSub").textContent="已完成 · 查看结果";
  // scores
  let s1=0; T.stage1.questions.forEach((q,i)=>{if((responses.stage1[i]||"")===q.answer)s1++;});
  let s2=0; for(const k in T.stage2.answers){if((responses.stage2[k]||"")===T.stage2.answers[k])s2++;}
  let s3=0; T.stage3.statements.forEach((s,i)=>{if(responses.stage3[i]===s.answer)s3++;});
  let s4=0; T.stage4.questions.forEach((q,i)=>{if(arrEq(responses.stage4[i]||[],q.answer))s4++;});
  const total=s1+s2+s3+s4;

  const t1=T.stage1.questions.map((q,i)=>{const y=responses.stage1[i]||"—",ok=y===q.answer;
    return `<tr><td class="center"><b>${i+1}</b></td><td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${q.answer}</b></td><td>${q.explain}</td></tr>`;}).join("");
  const t2=T.stage2.parts.map(p=>{const y=responses.stage2[p.n]||"—",corr=T.stage2.answers[p.n],ok=y===corr;
    return `<tr><td>${p.n}. ${p.label}</td><td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${corr}</b></td><td>${T.stage2.explanations[p.n]}</td></tr>`;}).join("");
  const t3=T.stage3.statements.map((s,i)=>{const yi=responses.stage3[i];const y=yi>=0?T.stage3.options4[yi]:"—";
    const ok=yi===s.answer; return `<tr><td>${i+1}. ${s.text}</td><td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${T.stage3.options4[s.answer]}</b></td><td>${s.explain}</td></tr>`;}).join("");
  const t4=T.stage4.questions.map((q,i)=>{const y=(responses.stage4[i]||[]);const ok=arrEq(y,q.answer);
    return `<tr><td class="center"><b>${i+1}</b></td><td class="center ${ok?'ok':'bad'}">${y.join(",")||"—"} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${q.answer.join(", ")}</b></td><td>${q.explain}</td></tr>`;}).join("");

  const tr=(key,title)=>{const lines=T[key].transcript.map(l=>`<div class="tr-line"><span class="sp">${l.who==='N'?'▶':(l.who==='M'?'M':'W')}</span>${l.text}</div>`).join("");
    return `<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:700;color:var(--purple)">📄 展开 ${title} 录音原文</summary>
      <div style="margin-top:8px">${lines}<p style="margin-top:8px"><button class="ghost" onclick="speakLines(LISTEN_TESTS[${testIndex}].${key}.transcript)">🔊 重新播放录音</button></p></div></details>`;};

  app().innerHTML=`
    <div class="card"><h1 style="text-align:center">${T.name} · 成绩</h1>
      <div class="score-big">${total} / 24</div>
      <div class="stage-scores">
        <div class="ss"><b>${s1}/10</b><span>Stage 1</span></div>
        <div class="ss"><b>${s2}/5</b><span>Stage 2</span></div>
        <div class="ss"><b>${s3}/6</b><span>Stage 3</span></div>
        <div class="ss"><b>${s4}/3</b><span>Stage 4</span></div></div>
      <p class="center" style="margin-top:18px">
        <button class="primary" onclick="startTest(${testIndex})">重做本套 ↺</button>
        <button class="ghost" onclick="renderHome()" style="margin-left:10px">返回选卷</button></p>
    </div>
    <div class="card"><h2>Stage 1 · 三选一</h2>
      <table class="results"><thead><tr><th>题</th><th>你的答案</th><th>正确</th><th>解析</th></tr></thead><tbody>${t1}</tbody></table>
      ${tr("stage1","Stage 1")}</div>
    <div class="card"><h2>Stage 2 · 部分配决定</h2>
      <table class="results"><thead><tr><th>部分</th><th>你的答案</th><th>正确</th><th>解析</th></tr></thead><tbody>${t2}</tbody></table>
      <p class="muted" style="margin-top:8px">${T.stage2.unusedNote||""}</p>${tr("stage2","Stage 2")}</div>
    <div class="card"><h2>Stage 3 · 观点归属</h2>
      <table class="results"><thead><tr><th>陈述</th><th>你的答案</th><th>正确</th><th>解析</th></tr></thead><tbody>${t3}</tbody></table>
      ${tr("stage3","Stage 3")}</div>
    <div class="card"><h2>Stage 4 · 多选</h2>
      <table class="results"><thead><tr><th>题</th><th>你的答案</th><th>正确</th><th>解析</th></tr></thead><tbody>${t4}</tbody></table>
      <p class="muted" style="margin-top:8px">多选题需全部选对且不多选才算得分。</p>${tr("stage4","Stage 4")}</div>`;
  window.scrollTo(0,0);
}

/* ==================== 高亮 ==================== */
const hlBtn=$("hlBtn"); let savedRange=null;
document.addEventListener("mouseup",e=>{
  if(e.target===hlBtn)return;
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount){hlBtn.classList.add("hidden");return;}
    const range=sel.getRangeAt(0); const cont=range.commonAncestorContainer;
    const el=cont.nodeType===3?cont.parentElement:cont;
    if(!el||!el.closest(".highlightable")){hlBtn.classList.add("hidden");return;}
    savedRange=range.cloneRange(); const r=range.getBoundingClientRect();
    hlBtn.style.top=(window.scrollY+r.top-38)+"px"; hlBtn.style.left=(window.scrollX+r.left+r.width/2-34)+"px";
    hlBtn.classList.remove("hidden");
  },10);
});
hlBtn.addEventListener("click",()=>{ if(savedRange)highlightRange(savedRange); hlBtn.classList.add("hidden");
  window.getSelection().removeAllRanges(); savedRange=null; });
document.addEventListener("click",e=>{
  const mark=e.target.closest("mark.hl");
  if(mark&&(!window.getSelection()||window.getSelection().isCollapsed)){
    const p=mark.parentNode; while(mark.firstChild)p.insertBefore(mark.firstChild,mark); p.removeChild(mark); p.normalize();
  }
});
function highlightRange(range){
  if(range.collapsed)return;
  const root=range.commonAncestorContainer.nodeType===3?range.commonAncestorContainer.parentElement:range.commonAncestorContainer;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(node){
    if(!range.intersectsNode(node))return NodeFilter.FILTER_REJECT;
    if(node.parentElement.closest("mark.hl"))return NodeFilter.FILTER_REJECT;
    if(!node.parentElement.closest(".highlightable"))return NodeFilter.FILTER_REJECT;
    if(!node.textContent.trim())return NodeFilter.FILTER_REJECT;
    return NodeFilter.FILTER_ACCEPT;}});
  const nodes=[]; while(walker.nextNode())nodes.push(walker.currentNode);
  for(const node of nodes){
    let start=0,end=node.textContent.length;
    if(node===range.startContainer)start=range.startOffset;
    if(node===range.endContainer)end=range.endOffset;
    if(start>=end)continue;
    const middle=start>0?node.splitText(start):node;
    if(end-start<middle.textContent.length)middle.splitText(end-start);
    const mark=document.createElement("mark"); mark.className="hl";
    middle.parentNode.insertBefore(mark,middle); mark.appendChild(middle);
  }
}

/* ==================== 启动 ==================== */
renderHome();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>BE10 Reading Test — 完整模拟考</title>
<style>
  :root{
    --purple:#51247a; --purple-light:#962a8b; --bg:#f6f4f9; --card:#fff;
    --text:#2b2b2b; --muted:#6b6b7b; --green:#1e7d45; --red:#c0392b;
    --amber:#b45309; --hl:#ffe066; --line:#e4dff0;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.65;}
  .topbar{position:sticky;top:0;z-index:50;background:var(--purple);color:#fff;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:9px 20px;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .topbar .t1{font-weight:700;font-size:14.5px;}
  .topbar .t2{font-size:12.5px;opacity:.85;}
  .timer{font-variant-numeric:tabular-nums;font-size:24px;font-weight:700;
    background:rgba(255,255,255,.14);padding:2px 15px;border-radius:8px;min-width:104px;text-align:center;transition:background .3s;}
  .timer.warning{background:#e67e22;}
  .timer.danger{background:var(--red);animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.55;}}
  .container{max-width:1180px;margin:0 auto;padding:22px 18px 90px;}
  .card{background:var(--card);border-radius:12px;padding:24px 28px;margin-bottom:18px;
    box-shadow:0 1px 4px rgba(60,40,90,.08);}
  h1{color:var(--purple);font-size:23px;margin:0 0 6px;}
  h2{color:var(--purple);font-size:19px;margin:0 0 12px;}
  h3{font-size:16px;margin:18px 0 8px;color:var(--purple-light);}
  .muted{color:var(--muted);font-size:14px;}
  .hidden{display:none!important;}
  button.primary{background:var(--purple);color:#fff;border:none;padding:12px 32px;
    font-size:16px;font-weight:600;border-radius:8px;cursor:pointer;transition:background .2s;}
  button.primary:hover{background:var(--purple-light);}
  button.ghost{background:transparent;color:var(--purple);border:1.5px solid var(--purple);
    padding:9px 22px;font-size:14.5px;border-radius:8px;cursor:pointer;}
  button.ghost:hover{background:#f0eaf7;}
  .badge{display:inline-block;background:#efe8f7;color:var(--purple);border-radius:6px;
    padding:1px 9px;font-size:12.5px;font-weight:600;}
  .test-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media(max-width:760px){.test-cards{grid-template-columns:1fr;}}
  .test-card{border:1.5px solid var(--line);border-radius:12px;padding:20px;cursor:pointer;
    transition:.15s;background:#fff;}
  .test-card:hover{border-color:var(--purple);box-shadow:0 4px 14px rgba(81,36,122,.14);transform:translateY(-2px);}
  .test-card h3{margin:0 0 8px;color:var(--purple);font-size:18px;}
  .test-card ul{margin:6px 0 0;padding-left:18px;font-size:13.5px;color:var(--muted);}
  .test-card li{margin-bottom:2px;}
  .stage-progress{display:flex;gap:6px;align-items:center;}
  .dot{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
  .dot.active{background:#fff;color:var(--purple);}
  .dot.done{background:#8f6db3;}
  .q-block{padding:18px 0;border-bottom:1px solid var(--line);}
  .q-block:last-child{border-bottom:none;}
  .q-num{font-weight:700;color:var(--purple);}
  .q-stem{font-weight:600;margin:2px 0 10px;}
  .para{margin:0 0 12px;}
  .opt{display:block;padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:7px;cursor:pointer;transition:.12s;}
  .opt:hover{border-color:var(--purple-light);background:#faf7fd;}
  .opt input{margin-right:9px;}
  .opt.sel{border-color:var(--purple);background:#f3ecfa;}
  .grid2{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;}
  @media(max-width:900px){.grid2{grid-template-columns:1fr;}}
  .section-block{margin-bottom:16px;}
  .section-letter{font-weight:800;color:var(--purple);font-size:16px;margin-right:6px;}
  .side{position:sticky;top:64px;}
  .headings-list{list-style:none;padding:0;margin:0;}
  .headings-list li{padding:6px 10px;border-radius:6px;margin-bottom:2px;display:flex;gap:10px;font-size:14px;}
  .headings-list li:nth-child(odd){background:#faf8fd;}
  .headings-list .num{font-weight:700;color:var(--purple);min-width:26px;}
  .answer-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .answer-row label{font-weight:600;min-width:90px;font-size:14px;}
  .answer-row select{flex:1;padding:6px 9px;font-size:14px;border:1.5px solid #ccc;border-radius:6px;background:#fff;}
  .answer-row select.dup{border-color:var(--amber);background:#fff7ea;}
  .dup-warn{color:var(--amber);font-size:13px;margin-top:4px;}
  .stmt{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;}
  .stmt select{padding:6px 8px;font-size:14px;border:1.5px solid #ccc;border-radius:6px;background:#fff;min-width:64px;}
  .gap-slot{background:#f3ecfa;border:1.5px dashed var(--purple-light);border-radius:8px;padding:10px 14px;margin:12px 0;}
  .gap-slot label{font-weight:700;color:var(--purple);margin-right:10px;}
  .gap-slot select{padding:6px 9px;font-size:14px;border:1.5px solid #ccc;border-radius:6px;background:#fff;}
  .gap-slot select.dup{border-color:var(--amber);background:#fff7ea;}
  .opt-list{list-style:none;padding:0;margin:0;}
  .opt-list li{padding:9px 12px;border-radius:8px;margin-bottom:7px;background:#faf8fd;border:1px solid var(--line);font-size:14px;}
  .opt-list .ol{font-weight:800;color:var(--purple);margin-right:6px;}
  .highlightable{cursor:text;}
  mark.hl{background:var(--hl);padding:0 1px;border-radius:2px;cursor:pointer;}
  mark.hl:hover{background:#ffd43b;}
  #hlBtn{position:absolute;z-index:99;background:#333;color:#fff;border:none;padding:5px 12px;
    border-radius:6px;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .hl-tip{font-size:13px;color:var(--muted);margin:6px 0 0;}
  .score-big{font-size:50px;font-weight:800;color:var(--purple);line-height:1.1;text-align:center;}
  .stage-scores{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;}
  .ss{background:#f3ecfa;border-radius:10px;padding:8px 16px;text-align:center;min-width:96px;}
  .ss b{display:block;color:var(--purple);font-size:20px;}
  .ss span{font-size:12.5px;color:var(--muted);}
  table.results{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px;}
  table.results th,table.results td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;}
  table.results th{background:#f2edf9;color:var(--purple);}
  .ok{color:var(--green);font-weight:700;}
  .bad{color:var(--red);font-weight:700;}
  .center{text-align:center;}
</style>
</head>

<script>
/* ============================================================
   题库（全新三套 · 加长版，段落长度贴近真题）。规格：
   Stage1 8题×2分钟(16分)；Stage2 7段/9标题(8分)；
   Stage3 7段A-G/6题(可重复/有未用,11分)；Stage4 6空/7段(14分)。
   ============================================================ */
const TESTS = [
/* ==================== TEST 1 ==================== */
{
  name:"Reading Test 1",
  topics:"深海采矿 · 摩天大楼 · 盐 · 土豆",
  stage1:{
    time:960,
    questions:[
      { q:"What main point is the writer making about deep-sea mining?",
        para:"Thousands of metres below the ocean surface lies a resource that industry has long coveted: potato-sized lumps of rock, scattered in their billions across the abyssal plains, that are unusually rich in the cobalt, nickel and manganese needed for batteries and electronics. Mining companies argue that hoovering up these nodules could supply the raw materials for a cleaner, electrified future while avoiding the pollution and human misery caused by many mines on land. Marine scientists, however, are far less certain. The deep sea floor, they point out, is among the least explored environments anywhere on the planet, home to slow-growing, fragile creatures found nowhere else, and giant machines scraping it bare could wipe out entire ecosystems before we have even catalogued them. Because these habitats recover over thousands of years, if they recover at all, the damage would in practice be permanent. The central question, then, is not whether these metals are valuable, but whether we truly understand the cost of taking them.",
        options:{A:"It is the only possible source of the metals batteries need.",B:"Its true environmental cost is still poorly understood.",C:"Its benefits are obvious while its risks are trivial.",D:"It has already destroyed most of the deep sea floor."},
        answer:"B",
        explain:"主旨：这些金属虽有价值，但开采的真实代价我们还不清楚（least explored；damage permanent）。A、D 夸大；C 与作者「far less certain」的立场相反。" },
      { q:"What is the writer doing in this passage?",
        para:"Ask most parents and they will tell you, with complete confidence, that sugar makes children hyperactive; the chaos of a birthday party is routinely blamed on the cake and fizzy drinks. The belief is so widespread, and repeated so often, that it has come to feel like plain common sense rather than something that could be tested. Yet when researchers have carefully given some children sugary drinks and others identical-tasting drinks containing no sugar at all — without telling anyone, parents or children, which was which — they have consistently found no difference whatever in the children's actual behaviour. What did reliably differ was the parents' judgement: those who had been told, truthfully or not, that their child had just eaten sugar rated that child as noticeably more wild and excitable, even when no sugar had been given. The famous 'sugar rush', it seems, may live mainly in the expectations of the adults doing the watching, rather than in the children themselves.",
        options:{A:"explaining the process by which sugar makes children hyperactive",B:"advising parents to avoid serving cake at children's parties",C:"debunking a widely held belief about sugar and behaviour",D:"describing how sugary drinks are manufactured and sold"},
        answer:"C",
        explain:"作者在戳破「糖让孩子亢奋」这一流行误解（found no difference whatever）。A 建立在错误前提上；B、D 均非本段所做的事。" },
      { q:"What would make a good heading for this paragraph?",
        para:"In an age when almost any song ever recorded can be streamed instantly, in perfect quality, for little or nothing, one stubbornly old technology has staged a genuinely unlikely comeback. Sales of vinyl records — those large black discs that a generation ago seemed destined only for charity shops and museums — have now risen every single year for well over a decade, and in some countries they once again outsell the compact disc. Part of the appeal is the warm, slightly imperfect sound that many listeners swear they can hear; part is the simple, almost old-fashioned pleasure of holding a physical object, with its large cover artwork, printed lyrics and sleeve notes, in a world where music has otherwise become weightless and invisible. For a growing number of buyers, many of them young enough never to have owned a record player before, a record is no longer merely a way to hear music but a thing to own, to display on a shelf and to treasure.",
        options:{A:"The surprising return of a physical format",B:"How vinyl records are manufactured today",C:"Why streaming has ruined the music industry",D:"The best-selling music albums of all time"},
        answer:"A",
        explain:"主旨：一种实体格式意外回归。B、D 与内容无关；C 与文中「comeback」的正面态度相反。" },
      { q:"What is the writer concerned about in this paragraph?",
        para:"It is one of the most ordinary substances imaginable, so cheap and so plentiful that we rarely give it a second thought, and yet the world is quietly running short of it. Sand — specifically the hard, angular grains found in riverbeds, floodplains and on the seabed — is the main ingredient of the concrete and glass from which almost every modern city is built, and we now dig it up and consume it far faster than the world's rivers can grind fresh rock into more. Desert sand, endlessly smoothed and rounded by the wind, is useless for construction, so the relentless pressure falls instead on rivers, beaches and coastlines, which are being stripped bare, sometimes by organised criminal gangs, at enormous environmental cost. Riverbanks collapse, farmland is undermined and whole beaches vanish. A resource we have always lazily assumed to be effectively limitless is, almost entirely unnoticed, becoming genuinely and dangerously scarce.",
        options:{A:"the steadily rising cost of building materials in cities",B:"the difficulty of using desert sand for construction",C:"the pollution of rivers by large construction companies",D:"that a resource long assumed limitless is being used up at great cost"},
        answer:"D",
        explain:"作者担忧：一直被当作用之不竭的沙子正在被破坏性地耗尽。A、C 与本段无关；B 只是文中一处细节。" },
      { q:"What main point is the writer making about gig work?",
        para:"Delivering meals by bicycle, driving passengers across the city, completing small tasks online for clients on the other side of the world: millions of people now earn all or part of their living through apps that hand out work by the individual job rather than by the hour or the month. Supporters praise the flexibility above all — the freedom to log on and off whenever you like, to fit work around study or childcare, to be, in a sense, your own boss. But this celebrated freedom comes with a catch that is remarkably easy to overlook. Gig workers are almost always classed not as employees but as self-employed independent contractors, which means that in exchange they receive no sick pay, no paid holiday, no pension contributions and next to no protection against being dropped without warning. The flexibility they are offered, in other words, is entirely real — but so, exactly, is the safety net they quietly surrender in order to get it.",
        options:{A:"Gig work is the best kind of employment for most people.",B:"Gig work offers flexibility but at the cost of important protections.",C:"Gig workers reliably earn far more than traditional employees.",D:"Apps should be banned from offering any work by the job."},
        answer:"B",
        explain:"主旨：零工提供灵活性，代价是放弃了重要保障。A、C 与文意不符；D 是作者未提出的极端主张。" },
      { q:"What can be concluded from this paragraph?",
        para:"A dog's nose is a truly extraordinary instrument, so sensitive that it can seem almost like a different sense altogether. Where a human being has somewhere around five million scent receptors lining the nose, a dog may have as many as three hundred million, and a far larger share of its brain is given over to making sense of what all those receptors detect. Trained dogs already sniff out explosives, drugs and missing people, and in a number of carefully controlled trials some have identified breath or urine samples from patients with certain cancers more accurately than the standard laboratory tests. Researchers now increasingly wonder whether the dogs are responding to faint chemical traces that our best machines simply cannot yet detect at all — and whether, by working out exactly which molecules the animals are reacting to, we might one day design electronic instruments that finally rival them. For now, though, the living nose remains well ahead of the machine.",
        options:{A:"Dogs will soon completely replace all medical laboratories.",B:"Machines are already far better than dogs at detecting cancer.",C:"A dog's sense of smell may point the way to new detection tools.",D:"Humans actually have more scent receptors than dogs do."},
        answer:"C",
        explain:"可推断：研究狗的嗅觉或能启发新的检测工具。A 夸大；B、D 与文中事实相反。" },
      { q:"How does the writer feel about editing the genes of human embryos?",
        para:"The ability to edit the genes of a human embryo, until recently the stuff of pure science fiction, is now genuinely within technical reach, and its potential is undeniably dazzling: inherited diseases that have blighted particular families for generations might one day simply be switched off before a child is even born. And yet, for all that, I find it hard to share the excitement entirely without reservation. The very same precise tools that could erase a fatal illness could, in principle, just as easily be turned to selecting for height, for intelligence, or for a fashionable appearance, and the line between healing the sick and enhancing the healthy is far blurrier, and far easier to cross, than its most eager enthusiasts are willing to admit. There is also the uncomfortable question of who would be able to afford such interventions, and who would be left behind. Before we rush to rewrite the human blueprint, we would do well to ask not only what we can now do, but who exactly gets to decide what counts as an improvement.",
        options:{A:"wholeheartedly enthusiastic about all of its possible uses",B:"convinced that it should never even be researched",C:"impressed by its promise but uneasy about its wider use",D:"completely indifferent to the ethical questions it raises"},
        answer:"C",
        explain:"作者被其医疗前景打动（dazzling），却对「治疗与增强」的界限、公平问题感到不安。A 过度肯定；B 过度否定；D 与全段的伦理关切相反。" },
      { q:"What is the writer doing in this passage?",
        para:"Roughly once every two weeks, somewhere in the world, the very last fluent speaker of a language dies, and with that single death an entire way of seeing and describing the world quietly slips out of existence. It is tempting to regard this as sad, perhaps, but ultimately unimportant — a natural thinning-out of the world's thousands of tongues that conveniently leaves us all with a handful of shared, global languages. That comfortable view, however, badly misunderstands what is actually being lost. Every language is a vast store of knowledge patiently accumulated over many centuries — knowledge of local plants and their uses, of weather signs, of how to navigate a particular coastline, of a people's history and law — much of it encoded in words and distinctions that have no real equivalent anywhere else. So when a language finally falls silent, we do not simply lose an unfamiliar set of sounds; we lose a unique and irreplaceable library that, in most cases, no one ever thought to copy down.",
        options:{A:"challenging the idea that the loss of languages does not matter",B:"explaining the ordinary ways in which languages change over time",C:"arguing that a few global languages would be far more convenient",D:"describing which languages are currently the most widely spoken"},
        answer:"A",
        explain:"作者在反驳「语言消失无关紧要」的看法（That comfortable view misunderstands...）。C 正是作者要驳斥的观点；B、D 均非本段所做的事。" }
    ]
  },
  stage2:{
    time:480,
    title:"Reaching for the Sky: The Story of the Skyscraper",
    headings:{
      i:"The drawbacks felt at street level",
      ii:"An old ambition once held back by materials",
      iii:"Making tall buildings greener",
      iv:"Why costly land pushed buildings upward",
      v:"Two inventions that made great height possible",
      vi:"An ambition unlikely ever to fade",
      vii:"More than space: a symbol of pride",
      viii:"How to design a small house with a garden",
      ix:"Why cities ought to ban all tall buildings"
    },
    sections:{
      A:"There has always been something in the human spirit that wanted to build upwards, to raise towers and spires that reach far above the everyday world. Yet for almost the whole of history, height was strictly and stubbornly limited by the materials that were available. In a tall building made of stone or brick, every floor has to be supported by the walls beneath it, which means the walls at the very bottom must be made immensely, wastefully thick simply to carry the crushing weight of everything above. This made genuinely tall structures hugely expensive, dark inside, and largely impractical. The skyscraper, as we now understand it, simply could not exist at all until that basic and ancient problem had somehow been solved.",
      B:"The decisive breakthrough finally came in the late nineteenth century with the development of the steel frame. Instead of thick outer walls carrying the load, engineers built a rigid internal skeleton of steel beams and columns, and the walls became little more than a thin, light skin hung from that frame like a curtain. Almost overnight, buildings could climb far higher without becoming impossibly heavy and expensive at the base. A second invention was very nearly as important as the first: the safe passenger lift, fitted with a device that would lock it in place if the cable ever failed, which at last made the upper floors of a very tall building somewhere people were actually willing to go.",
      C:"Skyscrapers did not, however, spring up everywhere at once, but appeared first in a few very particular places. They rose earliest in booming cities such as Chicago and New York, where land in the crowded commercial centre had become extraordinarily, almost absurdly expensive. When a small plot of ground in the heart of the city costs an absolute fortune, the only sensible way to get more valuable, rentable floor space out of it is to keep building upwards, stacking storey upon storey. Height, in these particular cities at least, was therefore driven at least as much by hard economics and the price of land as it ever was by engineering ambition or architectural pride.",
      D:"Almost from the very beginning, though, tall buildings were about a great deal more than simply the practical need for space. A single soaring tower loudly announced the wealth, the confidence and the sheer ambition of the company or the city that had dared to build it, and rival firms and rival cities soon began competing openly to raise the tallest structure in the world. That strange, expensive race has never really stopped. Today the coveted record for the world's tallest building passes back and forth between ever more extravagant towers in the Middle East and eastern Asia, each new one built at least partly as a deliberate and unmistakable statement of national arrival and pride.",
      E:"Not everyone, it should be said, has ever admired the results of all this upward ambition. Critics have long argued that dense clusters of very tall towers cast entire streets and neighbourhoods into cold permanent shadow, that they funnel fierce, unpleasant winds straight down to the pavements below, and that they can leave the spaces around their feet feeling bleak, windswept and strangely inhuman. A whole city of glass and steel giants, these critics warn, however impressive it may look from a distance or from the air, can turn out to be a genuinely uncomfortable and unwelcoming place for the ordinary people who actually have to live and walk about down at ground level.",
      F:"Modern skyscrapers face a further, and increasingly pressing, challenge of their own: energy. A tall tower wrapped entirely in glass can trap the heat of the sun like a giant greenhouse, and then demand enormous, continuous amounts of electricity to pump it back out and keep the interior cool enough to use. In response, a new generation of architects now deliberately design buildings that shade themselves from the harshest sun, that can open to catch and channel passing breezes, and that even generate a useful share of their own power from wind or solar panels, all in a serious effort to make great height environmentally sustainable as well as merely impressive to look at.",
      G:"Whether we should carry on building upwards at all is a question that seems certain only to grow louder in the years ahead. Supporters insist that concentrating large numbers of people in tall buildings saves precious land, protects the countryside and dramatically shortens the daily journeys between home and work. Opponents reply, just as firmly, that we could perfectly well live good and comfortable lives without towers of any kind. What does seem beyond much doubt, however, is that for as long as land in great cities remains scarce and human ambition remains anything but, the old, restless urge to reach up towards the sky is unlikely ever to fade away."
    },
    answers:{A:"ii",B:"v",C:"iv",D:"vii",E:"i",F:"iii",G:"vi"},
    explanations:{
      A:"过去建筑的高度受材料限制（an old ambition held back by materials）。",
      B:"两项发明——钢架 + 安全电梯——让高度成为可能。",
      C:"中心地价昂贵，把建筑逼向高空（costly land）。",
      D:"高楼不只为空间，更是财富与野心的象征。",
      E:"高楼在街道层面的弊端（阴影、强风、冷漠）。",
      F:"让高楼更环保（自遮阳、通风、自发电）。",
      G:"只要土地稀缺、野心不减，向上建的冲动就不会消退。"
    },
    distractors:{
      viii:"「如何设计带花园的小房子」与摩天楼主题无关，是操作指南。",
      ix:"「城市应禁止一切高楼」——G 段只是提到有反对者，并未主张全面禁止。"
    }
  },
  stage3:{
    time:660,
    title:"Salt: The Rock That Shaped History",
    sections:{
      A:"Salt is so cheap and so common today, sitting forgotten in a cupboard in every kitchen, that it is genuinely easy to forget how astonishingly precious it once was. Yet the plain fact is that the human body simply cannot live without it: salt helps our nerves carry their signals, allows our muscles to contract, and lets our bodies hold on to the right amount of water. In hot climates, and for anyone doing hard physical work, a steady supply is a matter of life and death. For most of recorded history, therefore, obtaining enough salt was a genuine question of survival, and countless societies organised much of their trade, their taxes and even their wars around finding it, moving it and controlling it.",
      B:"Broadly speaking, salt was gathered in two main ways. In hot, dry regions along the coast, people channelled sea water into a series of wide, shallow ponds and simply let the fierce sun evaporate it away, day after day, until nothing was left behind but glittering white crystals ready to be raked up. Elsewhere, far from any sea, salt was mined directly from the rock, or pumped up as heavily salted water, called brine, from deep underground deposits that were the dried-up remains of ancient oceans, and then boiled for hours over great fires until only the salt remained. Both methods demanded enormous amounts of labour, fuel and time, which is a large part of the reason the finished product was for so long so valuable.",
      C:"Long before anyone had refrigeration, salt was by far the most important means of keeping food from rotting away. Meat, fish and butter packed and rubbed with salt could be stored safely for many months and carried over enormous distances without spoiling, which in turn meant that armies could be fed on long campaigns far from home and that crowded cities could be kept supplied right through the barren winter. Whole industries — great fishing fleets, curing houses, trading companies — and even the rise and fall of the fortunes of entire nations came to rest, in the end, on the humble, unglamorous ability of a little salt to preserve food and hold decay at bay.",
      D:"Because it was at once absolutely essential to life and genuinely hard to obtain, salt was very often treated almost as if it were money in its own right. Roman soldiers, so the story goes, were sometimes paid partly in salt, and our very word 'salary' descends directly from the Latin word for it. Rulers and governments right across the world, understanding perfectly well that ordinary people had no real choice but to keep buying salt whatever the price, taxed it ruthlessly and heavily. The steady, reliable revenue from these salt taxes filled royal treasuries and paid for palaces and armies for many centuries, in China, in France and in countless empires in between.",

  stage3:{
    time:660,
    title:"The Great Migrations of Birds",
    sections:{
      A:"Twice every year, billions upon billions of birds take to the skies in one of the very greatest spectacles the natural world has to offer. Fleeing the approaching cold and forever searching for reliable food, they travel from their summer breeding grounds to warmer regions and then, months later, all the way back again, some of them crossing entire oceans, deserts and continents in the process. A few make journeys so staggeringly long that they are almost hard to believe: the small, delicate Arctic tern, for instance, flies all the way from the Arctic to the Antarctic and back every single year, a round trip of tens of thousands of kilometres that means it sees more daylight in its life than any other creature on Earth.",
      B:"Exactly how birds manage to find their way so accurately across such vast and featureless distances has puzzled and fascinated scientists for a very long time. It now appears that they use several different methods all at once, cross-checking one against another: the changing position of the sun during the day and the patterns of the stars at night, familiar large-scale landmarks such as coastlines, mountain ranges and great rivers, and, most remarkably of all, the Earth's own magnetic field, which at least some birds seem genuinely able to sense directly, almost as if they carried a built-in compass. The young of some species appear to inherit the correct route in their genes, while others must learn it the hard way by following older, more experienced birds.",
      C:"Long-distance migration also demands quite extraordinary physical preparation from the birds that attempt it. In the busy weeks before departure, many species eat almost constantly and can very nearly double their entire body weight, laying down thick reserves of fat to serve as fuel for the journey ahead. Some are then able to fly for many days on end without ever once stopping to rest; one small shorebird, the bar-tailed godwit, has been tracked by scientists flying more than 11,000 kilometres straight across the open Pacific Ocean, from Alaska to New Zealand, without landing even a single time to rest, drink or feed along the entire way.",

      A:"Spider silk is, without much exaggeration, one of the most remarkable materials found anywhere in the entire natural world. Weight for weight, some kinds of spider silk are actually stronger than steel and tougher even than the specialised man-made fibres used to make bulletproof vests, and yet a single strand of it is so extraordinarily fine that it is very nearly invisible to the naked eye. On top of all that, it is astonishingly stretchy and elastic, able to absorb the full flying energy of a fat insect crashing into a web without ever once snapping under the strain. Small wonder, then, that engineers and inventors have dreamed for well over a century of somehow making a material even remotely as good.",

const STAGE_KEYS = ["stage1","stage2","stage3","stage4"];
const STAGE_NAMES = {
  stage1:"Stage 1 · Short Paragraphs（短段落）",
  stage2:"Stage 2 · Matching Headings（段落配标题）",
  stage3:"Stage 3 · Locating Information（信息定位）",
  stage4:"Stage 4 · Gapped Text（段落填空）"
};

/* ==================== 状态 ==================== */
let testIndex=0, stageIdx=0;
let timerInterval=null, secondsLeft=0;
let responses={};
const $=id=>document.getElementById(id);
const app=()=>$("app");

/* ==================== 计时 ==================== */
function startTimer(seconds,onEnd){
  clearInterval(timerInterval);
  secondsLeft=seconds; renderTimer();
  $("timer").classList.remove("hidden");
  timerInterval=setInterval(()=>{
    secondsLeft--; renderTimer();
    if(secondsLeft<=0){clearInterval(timerInterval); onEnd();}
  },1000);
}
function renderTimer(){
  const m=Math.floor(secondsLeft/60), s=secondsLeft%60;
  const el=$("timer");
  el.textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  el.classList.toggle("warning",secondsLeft<=60&&secondsLeft>15);
  el.classList.toggle("danger",secondsLeft<=15);
}
function stopTimer(){clearInterval(timerInterval);$("timer").classList.add("hidden");}

/* ==================== 进度点 ==================== */
function renderProgress(){
  const sp=$("stageProgress");
  sp.classList.remove("hidden");
  sp.innerHTML=[1,2,3,4].map((n,i)=>{
    let cls="dot"; if(i<stageIdx)cls+=" done"; if(i===stageIdx)cls+=" active";
    return `<div class="${cls}">${i<stageIdx?"✓":n}</div>`;
  }).join("");
}

/* ==================== 首页 ==================== */
function renderHome(){
  stopTimer();
  $("stageProgress").classList.add("hidden");
  $("tbTitle").textContent="BE10 Reading Test — 完整模拟考";
  $("tbSub").textContent="选择一套试卷开始";
  let cards=TESTS.map((t,i)=>`
    <div class="test-card" onclick="startTest(${i})">
      <h3>${t.name}</h3>
      <div class="muted" style="font-size:13px">${t.topics}</div>
      <ul>
        <li>Stage 1 短段落 · 8 题 · 16 分钟</li>
        <li>Stage 2 段落配标题 · 7 题 · 8 分钟</li>
        <li>Stage 3 信息定位 · 6 题 · 11 分钟</li>
        <li>Stage 4 段落填空 · 6 题 · 14 分钟</li>
      </ul>
      <p style="margin:14px 0 0"><button class="primary" style="width:100%">开始 ▶</button></p>
    </div>`).join("");
  app().innerHTML=`
    <div class="card">
      <h1>BE10 Reading 完整模拟考</h1>
      <p class="muted">三套试卷，每套都是完整的四阶段考试，按官方计时依次进行；全程可用鼠标选中文字 🖍 高亮。</p>
      <div style="background:#faf8fd;border-radius:10px;padding:14px 18px;margin:14px 0;font-size:14px">
        <b style="color:var(--purple)">考试流程</b>：Stage 1 → 2 → 3 → 4 依次进行，每部分独立倒计时；时间到或点「提交本部分」即进入下一部分。四部分全部完成后给出总分与逐题解析。共 <b>27 题</b>（Stage 1 有 8 题，每题约 2 分钟）。
      </div>
      <div class="test-cards">${cards}</div>
    </div>`;
}

function startTest(i){
  testIndex=i; stageIdx=0; responses={};
  $("tbTitle").textContent=TESTS[i].name;
  runStage();
}

/* ==================== 运行某一 Stage ==================== */
function runStage(){
  const key=STAGE_KEYS[stageIdx];
  renderProgress();
  $("tbSub").textContent=STAGE_NAMES[key];
  const st=TESTS[testIndex][key];
  if(key==="stage1")renderStage1(st);
  else if(key==="stage2")renderStage2(st);
  else if(key==="stage3")renderStage3(st);
  else renderStage4(st);
  startTimer(st.time,()=>submitStage(true));
  window.scrollTo(0,0);
}

function nextBtn(){
  return `<div class="card center">
    <button class="primary" onclick="submitStage(false)">提交本部分并继续 ✓</button>
    <div class="muted" style="margin-top:8px">未作答的题会记为错。时间到会自动提交。</div>
  </div>`;
}

/* ---------- Stage 1 ---------- */
function renderStage1(st){
  let qs=st.questions.map((q,idx)=>{
    const opts=Object.entries(q.options).map(([k,v])=>`
      <label class="opt" data-q="${idx}" data-v="${k}">
        <input type="radio" name="s1q${idx}" value="${k}" onchange="selOpt(${idx},'${k}')">
        <b>${k}.</b> ${v}
      </label>`).join("");
    return `<div class="q-block">
      <div class="q-stem"><span class="q-num">Question ${idx+1}.</span> ${q.q}</div>
      <p class="para">${q.para}</p>
      ${opts}
    </div>`;
  }).join("");
  app().innerHTML=`
    <div class="card">
      <h2>${STAGE_NAMES.stage1}</h2>
      <p class="muted">阅读每个独立的短段落，选出最能回答问题的一项。共 8 题，每题约 2 分钟（本部分共 16 分钟）。</p>
      <p class="hl-tip">🖍 可选中文字高亮关键词。</p>
    </div>
    <div class="card highlightable">${qs}</div>
    ${nextBtn()}`;
}
function selOpt(idx,k){
  document.querySelectorAll(`.opt[data-q="${idx}"]`).forEach(o=>o.classList.toggle("sel",o.dataset.v===k));
}

/* ---------- Stage 2 ---------- */
function headingsListHTML(headings){
  return '<ul class="headings-list">'+Object.entries(headings).map(([k,v])=>
    `<li><span class="num">${k}.</span><span>${v}</span></li>`).join("")+'</ul>';
}
function renderStage2(st){
  const passage=Object.entries(st.sections).map(([l,t])=>
    `<div class="section-block"><span class="section-letter">${l}.</span>${t}</div>`).join("");
  const rows=Object.keys(st.sections).map(l=>`
    <div class="answer-row">
      <label>Section ${l}</label>
      <select data-sec="${l}" onchange="checkDupSelect('#s2rows','sec')">
        <option value="">— 选择 —</option>
        ${Object.keys(st.headings).map(k=>`<option value="${k}">${k}. ${short(st.headings[k])}</option>`).join("")}
      </select>
    </div>`).join("");
  app().innerHTML=`
    <div class="card">
      <h2>${STAGE_NAMES.stage2}</h2>
      <p class="muted">文章有 7 个段落 A–G。从 9 个标题中为每段选出最合适的一个，有 2 个标题不会用到。</p>
      <p class="hl-tip">🖍 可选中文字高亮关键词。</p>
    </div>
    <div class="grid2">
      <div class="card passage highlightable">
        <h2 style="font-size:20px">${st.title}</h2>${passage}
      </div>
      <div>
        <div class="card side">
          <h2>你的答案</h2>
          <div id="s2rows">${rows}</div>
          <div class="dup-warn hidden" id="s2dup">⚠️ 有标题被重复使用（每个标题只能用一次）</div>
          <div class="card" style="padding:12px 14px;margin:14px 0 0;background:#faf8fd;box-shadow:none">
            <b style="color:var(--purple)">List of Headings</b>
            <div class="highlightable" style="font-size:13px;margin-top:6px">${headingsListHTML(st.headings)}</div>
          </div>
        </div>
      </div>
    </div>
    ${nextBtn()}`;
}
function short(s){return s.length>32?s.slice(0,32)+"…":s;}

/* ---------- Stage 3 ---------- */
function renderStage3(st){
  const letters=Object.keys(st.sections);
  const passage=Object.entries(st.sections).map(([l,t])=>
    `<div class="section-block"><span class="section-letter">${l}.</span>${t}</div>`).join("");
  const stmts=st.statements.map((s,i)=>`
    <div class="stmt">
      <select data-st="${i}">
        <option value="">?</option>
        ${letters.map(l=>`<option value="${l}">${l}</option>`).join("")}
      </select>
      <div class="highlightable"><b>${i+1}.</b> ${s.text}</div>
    </div>`).join("");
  app().innerHTML=`
    <div class="card">
      <h2>${STAGE_NAMES.stage3}</h2>
      <p class="muted">文章分 7 个部分 A–G。判断下列信息各出现在哪个部分。<b>同一字母可重复使用，也有部分用不到</b>。共 6 题。</p>
      <p class="hl-tip">🖍 文章和下面的信息句都可以选中高亮关键词。</p>
    </div>
    <div class="grid2">
      <div class="card passage highlightable">
        <h2 style="font-size:20px">${st.title}</h2>${passage}
      </div>
      <div>
        <div class="card side">
          <h2>信息定位</h2>
          <p class="muted" style="margin-top:0">选择包含该信息的部分：</p>
          ${stmts}
        </div>
      </div>
    </div>
    ${nextBtn()}`;
}

/* ---------- Stage 4 ---------- */
function renderStage4(st){
  const letters=Object.keys(st.options);
  const body=st.segments.map(seg=>{
    if(seg.t==="text")return `<p class="para">${seg.c}</p>`;
    return `<div class="gap-slot">
      <label>Gap ${seg.n}</label>
      <select data-gap="${seg.n}" onchange="checkDupSelect('#s4body','gap')">
        <option value="">— 选择段落 —</option>
        ${letters.map(l=>`<option value="${l}">${l}</option>`).join("")}
      </select>
    </div>`;
  }).join("");
  const opts=Object.entries(st.options).map(([l,t])=>
    `<li><span class="ol">${l}</span>${t}</li>`).join("");
  app().innerHTML=`
    <div class="card">
      <h2>${STAGE_NAMES.stage4}</h2>
      <p class="muted">文章中抽走了 6 个段落。从 A–G 中为每个空缺选择最合适的段落，有 1 个段落不会用到。</p>
      <p class="hl-tip">🖍 可选中文字高亮衔接线索（连接词、指代词、重复的关键词）。</p>
    </div>
    <div class="grid2">
      <div class="card highlightable" id="s4body">
        <h2 style="font-size:20px">${st.title}</h2>${body}
      </div>
      <div>
        <div class="card side">
          <h2>可选段落</h2>
          <div class="dup-warn hidden" id="s4dup">⚠️ 有段落被重复使用（每个段落只能填一个空）</div>
          <ul class="opt-list highlightable">${opts}</ul>
        </div>
      </div>
    </div>
    ${nextBtn()}`;
}

/* 重复选择检测（用于 stage2 与 stage4） */
function checkDupSelect(scope,attr){
  const sels=document.querySelectorAll(`${scope} select`);
  const counts={};
  sels.forEach(s=>{if(s.value)counts[s.value]=(counts[s.value]||0)+1;});
  let dup=false;
  sels.forEach(s=>{const d=s.value&&counts[s.value]>1;s.classList.toggle("dup",d);if(d)dup=true;});
  const warn=scope==="#s4body"?$("s4dup"):$("s2dup");
  if(warn)warn.classList.toggle("hidden",!dup);
}

/* ==================== 收集答案并推进 ==================== */
function collectStage(){
  const key=STAGE_KEYS[stageIdx];
  const st=TESTS[testIndex][key];
  if(key==="stage1"){
    const a={};
    st.questions.forEach((q,i)=>{const c=document.querySelector(`input[name="s1q${i}"]:checked`);a[i]=c?c.value:"";});
    responses.stage1=a;
  }else if(key==="stage2"){
    const a={};
    document.querySelectorAll('#s2rows select').forEach(s=>a[s.dataset.sec]=s.value);
    responses.stage2=a;
  }else if(key==="stage3"){
    const a={};
    document.querySelectorAll('.stmt select').forEach(s=>a[s.dataset.st]=s.value);
    responses.stage3=a;
  }else{
    const a={};
    document.querySelectorAll('#s4body select').forEach(s=>a[s.dataset.gap]=s.value);
    responses.stage4=a;
  }
}
function submitStage(auto){
  collectStage();
  stageIdx++;
  if(stageIdx<4){ runStage(); }
  else { stopTimer(); renderResults(); }
}

/* ==================== 结果 ==================== */
function gradeStage1(st){
  let c=0; st.questions.forEach((q,i)=>{if((responses.stage1[i]||"")===q.answer)c++;});
  return c;
}
function gradeMap(answers,resp){
  let c=0; for(const k in answers){if((resp[k]||"")===answers[k])c++;} return c;
}
function renderResults(){
  const T=TESTS[testIndex];
  $("stageProgress").classList.add("hidden");
  $("tbSub").textContent="已完成 · 查看结果";
  const s1=gradeStage1(T.stage1);
  const s2=gradeMap(T.stage2.answers,responses.stage2);
  let s3=0; T.stage3.statements.forEach((s,i)=>{if((responses.stage3[i]||"")===s.answer)s3++;});
  const s4=gradeMap(T.stage4.answers,responses.stage4);
  const total=s1+s2+s3+s4;

  let t1=T.stage1.questions.map((q,i)=>{
    const y=responses.stage1[i]||"—", ok=y===q.answer;
    return `<tr><td class="center"><b>${i+1}</b></td>
      <td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${q.answer}</b></td>
      <td>${q.explain}</td></tr>`;
  }).join("");

  let t2=Object.keys(T.stage2.sections).map(l=>{
    const y=responses.stage2[l]||"—", corr=T.stage2.answers[l], ok=y===corr;
    return `<tr><td class="center"><b>${l}</b></td>
      <td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${corr}</b>. ${short(T.stage2.headings[corr])}</td>
      <td>${T.stage2.explanations[l]}</td></tr>`;
  }).join("");
  let d2=Object.entries(T.stage2.distractors).map(([k,v])=>`<p><b style="color:var(--purple)">${k}.</b> ${T.stage2.headings[k]} — ${v}</p>`).join("");

  let t3=T.stage3.statements.map((s,i)=>{
    const y=responses.stage3[i]||"—", ok=y===s.answer;
    return `<tr><td class="center"><b>${i+1}</b></td>
      <td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${s.answer}</b></td>
      <td>${s.text}<br><span class="muted">${s.explain}</span></td></tr>`;
  }).join("");

  let t4=Object.keys(T.stage4.answers).map(n=>{
    const y=responses.stage4[n]||"—", corr=T.stage4.answers[n], ok=y===corr;
    return `<tr><td class="center"><b>Gap ${n}</b></td>
      <td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${corr}</b></td>
      <td>${T.stage4.explanations[n]}</td></tr>`;
  }).join("");

  app().innerHTML=`
    <div class="card">
      <h1 style="text-align:center">${T.name} · 成绩</h1>
      <div class="score-big">${total} / 27</div>
      <div class="stage-scores">
        <div class="ss"><b>${s1}/8</b><span>Stage 1</span></div>
        <div class="ss"><b>${s2}/7</b><span>Stage 2</span></div>
        <div class="ss"><b>${s3}/6</b><span>Stage 3</span></div>
        <div class="ss"><b>${s4}/6</b><span>Stage 4</span></div>
      </div>
      <p class="center" style="margin-top:18px">
        <button class="primary" onclick="startTest(${testIndex})">重做本套 ↺</button>
        <button class="ghost" onclick="renderHome()" style="margin-left:10px">返回选卷</button>
      </p>
    </div>

    <div class="card">
      <h2>Stage 1 · Short Paragraphs</h2>
      <table class="results"><thead><tr><th>题号</th><th>你的答案</th><th>正确</th><th>解析</th></tr></thead><tbody>${t1}</tbody></table>
    </div>

    <div class="card">
      <h2>Stage 2 · Matching Headings</h2>
      <p class="muted">${T.stage2.title}</p>
      <table class="results"><thead><tr><th>段落</th><th>你的答案</th><th>正确标题</th><th>解析</th></tr></thead><tbody>${t2}</tbody></table>
      <h3>两个干扰标题为什么错</h3>${d2}
    </div>

    <div class="card">
      <h2>Stage 3 · Locating Information</h2>
      <p class="muted">${T.stage3.title}</p>
      <table class="results"><thead><tr><th>题号</th><th>你的答案</th><th>正确</th><th>信息 / 解析</th></tr></thead><tbody>${t3}</tbody></table>
      <p class="muted" style="margin-top:8px">${T.stage3.usedNote||""}</p>
    </div>

    <div class="card">
      <h2>Stage 4 · Gapped Text</h2>
      <p class="muted">${T.stage4.title}（未使用的段落：<b>${T.stage4.unused}</b>）</p>
      <table class="results"><thead><tr><th>空缺</th><th>你的答案</th><th>正确</th><th>衔接解析</th></tr></thead><tbody>${t4}</tbody></table>
      <p class="muted" style="margin-top:8px">${T.stage4.explanations.unused}</p>
    </div>`;
  window.scrollTo(0,0);
}

/* ==================== 高亮 ==================== */
const hlBtn=$("hlBtn"); let savedRange=null;
document.addEventListener("mouseup",e=>{
  if(e.target===hlBtn)return;
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount){hlBtn.classList.add("hidden");return;}
    const range=sel.getRangeAt(0);
    const cont=range.commonAncestorContainer;
    const el=cont.nodeType===3?cont.parentElement:cont;
    if(!el||!el.closest(".highlightable")){hlBtn.classList.add("hidden");return;}
    savedRange=range.cloneRange();
    const r=range.getBoundingClientRect();
    hlBtn.style.top=(window.scrollY+r.top-38)+"px";
    hlBtn.style.left=(window.scrollX+r.left+r.width/2-34)+"px";
    hlBtn.classList.remove("hidden");
  },10);
});
hlBtn.addEventListener("click",()=>{
  if(savedRange)highlightRange(savedRange);
  hlBtn.classList.add("hidden");
  window.getSelection().removeAllRanges(); savedRange=null;
});
document.addEventListener("click",e=>{
  const mark=e.target.closest("mark.hl");
  if(mark&&(!window.getSelection()||window.getSelection().isCollapsed)){
    const p=mark.parentNode;
    while(mark.firstChild)p.insertBefore(mark.firstChild,mark);
    p.removeChild(mark); p.normalize();
  }
});
function highlightRange(range){
  if(range.collapsed)return;
  const root=range.commonAncestorContainer.nodeType===3?range.commonAncestorContainer.parentElement:range.commonAncestorContainer;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
    acceptNode(node){
      if(!range.intersectsNode(node))return NodeFilter.FILTER_REJECT;
      if(node.parentElement.closest("mark.hl"))return NodeFilter.FILTER_REJECT;
      if(!node.parentElement.closest(".highlightable"))return NodeFilter.FILTER_REJECT;
      if(!node.textContent.trim())return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes=[]; while(walker.nextNode())nodes.push(walker.currentNode);
  for(const node of nodes){
    let start=0,end=node.textContent.length;
    if(node===range.startContainer)start=range.startOffset;
    if(node===range.endContainer)end=range.endOffset;
    if(start>=end)continue;
    const middle=start>0?node.splitText(start):node;
    if(end-start<middle.textContent.length)middle.splitText(end-start);
    const mark=document.createElement("mark"); mark.className="hl";
    middle.parentNode.insertBefore(mark,middle); mark.appendChild(middle);
  }
}

/* ==================== 启动 ==================== */
renderHome();
</script>

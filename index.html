<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BE10 Reading Test — 完整模拟考</title>
<style>
  :root{
    --purple:#51247a; --purple-light:#962a8b; --bg:#f6f4f9; --card:#fff;
    --text:#2b2b2b; --muted:#6b6b7b; --green:#1e7d45; --red:#c0392b;
    --amber:#b45309; --hl:#ffe066; --line:#e4dff0;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.65;}
  .topbar{position:sticky;top:0;z-index:50;background:var(--purple);color:#fff;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:9px 20px;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .topbar .t1{font-weight:700;font-size:14.5px;}
  .topbar .t2{font-size:12.5px;opacity:.85;}
  .timer{font-variant-numeric:tabular-nums;font-size:24px;font-weight:700;
    background:rgba(255,255,255,.14);padding:2px 15px;border-radius:8px;min-width:104px;text-align:center;transition:background .3s;}
  .timer.warning{background:#e67e22;}
  .timer.danger{background:var(--red);animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.55;}}
  .container{max-width:1180px;margin:0 auto;padding:22px 18px 90px;}
  .card{background:var(--card);border-radius:12px;padding:24px 28px;margin-bottom:18px;
    box-shadow:0 1px 4px rgba(60,40,90,.08);}
  h1{color:var(--purple);font-size:23px;margin:0 0 6px;}
  h2{color:var(--purple);font-size:19px;margin:0 0 12px;}
  h3{font-size:16px;margin:18px 0 8px;color:var(--purple-light);}
  .muted{color:var(--muted);font-size:14px;}
  .hidden{display:none!important;}
  button.primary{background:var(--purple);color:#fff;border:none;padding:12px 32px;
    font-size:16px;font-weight:600;border-radius:8px;cursor:pointer;transition:background .2s;}
  button.primary:hover{background:var(--purple-light);}
  button.ghost{background:transparent;color:var(--purple);border:1.5px solid var(--purple);
    padding:9px 22px;font-size:14.5px;border-radius:8px;cursor:pointer;}
  button.ghost:hover{background:#f0eaf7;}
  .badge{display:inline-block;background:#efe8f7;color:var(--purple);border-radius:6px;
    padding:1px 9px;font-size:12.5px;font-weight:600;}
  .test-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media(max-width:760px){.test-cards{grid-template-columns:1fr;}}
  .test-card{border:1.5px solid var(--line);border-radius:12px;padding:20px;cursor:pointer;
    transition:.15s;background:#fff;}
  .test-card:hover{border-color:var(--purple);box-shadow:0 4px 14px rgba(81,36,122,.14);transform:translateY(-2px);}
  .test-card h3{margin:0 0 8px;color:var(--purple);font-size:18px;}
  .test-card ul{margin:6px 0 0;padding-left:18px;font-size:13.5px;color:var(--muted);}
  .test-card li{margin-bottom:2px;}
  .stage-progress{display:flex;gap:6px;align-items:center;}
  .dot{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
  .dot.active{background:#fff;color:var(--purple);}
  .dot.done{background:#8f6db3;}
  .q-block{padding:18px 0;border-bottom:1px solid var(--line);}
  .q-block:last-child{border-bottom:none;}
  .q-num{font-weight:700;color:var(--purple);}
  .q-stem{font-weight:600;margin:2px 0 10px;}
  .para{margin:0 0 12px;}
  .opt{display:block;padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:7px;cursor:pointer;transition:.12s;}
  .opt:hover{border-color:var(--purple-light);background:#faf7fd;}
  .opt input{margin-right:9px;}
  .opt.sel{border-color:var(--purple);background:#f3ecfa;}
  .grid2{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;}
  @media(max-width:900px){.grid2{grid-template-columns:1fr;}}
  .section-block{margin-bottom:16px;}
  .section-letter{font-weight:800;color:var(--purple);font-size:16px;margin-right:6px;}
  .side{position:sticky;top:64px;}
  .headings-list{list-style:none;padding:0;margin:0;}
  .headings-list li{padding:6px 10px;border-radius:6px;margin-bottom:2px;display:flex;gap:10px;font-size:14px;}
  .headings-list li:nth-child(odd){background:#faf8fd;}
  .headings-list .num{font-weight:700;color:var(--purple);min-width:26px;}
  .answer-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .answer-row label{font-weight:600;min-width:90px;font-size:14px;}
  .answer-row select{flex:1;padding:6px 9px;font-size:14px;border:1.5px solid #ccc;border-radius:6px;background:#fff;}
  .answer-row select.dup{border-color:var(--amber);background:#fff7ea;}
  .dup-warn{color:var(--amber);font-size:13px;margin-top:4px;}
  .stmt{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;}
  .stmt select{padding:6px 8px;font-size:14px;border:1.5px solid #ccc;border-radius:6px;background:#fff;min-width:64px;}
  .gap-slot{background:#f3ecfa;border:1.5px dashed var(--purple-light);border-radius:8px;padding:10px 14px;margin:12px 0;}
  .gap-slot label{font-weight:700;color:var(--purple);margin-right:10px;}
  .gap-slot select{padding:6px 9px;font-size:14px;border:1.5px solid #ccc;border-radius:6px;background:#fff;}
  .gap-slot select.dup{border-color:var(--amber);background:#fff7ea;}
  .opt-list{list-style:none;padding:0;margin:0;}
  .opt-list li{padding:9px 12px;border-radius:8px;margin-bottom:7px;background:#faf8fd;border:1px solid var(--line);font-size:14px;}
  .opt-list .ol{font-weight:800;color:var(--purple);margin-right:6px;}
  .highlightable{cursor:text;}
  mark.hl{background:var(--hl);padding:0 1px;border-radius:2px;cursor:pointer;}
  mark.hl:hover{background:#ffd43b;}
  #hlBtn{position:absolute;z-index:99;background:#333;color:#fff;border:none;padding:5px 12px;
    border-radius:6px;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .hl-tip{font-size:13px;color:var(--muted);margin:6px 0 0;}
  .score-big{font-size:50px;font-weight:800;color:var(--purple);line-height:1.1;text-align:center;}
  .stage-scores{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;}
  .ss{background:#f3ecfa;border-radius:10px;padding:8px 16px;text-align:center;min-width:96px;}
  .ss b{display:block;color:var(--purple);font-size:20px;}
  .ss span{font-size:12.5px;color:var(--muted);}
  table.results{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px;}
  table.results th,table.results td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;}
  table.results th{background:#f2edf9;color:var(--purple);}
  .ok{color:var(--green);font-weight:700;}
  .bad{color:var(--red);font-weight:700;}
  .center{text-align:center;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="t1" id="tbTitle">BE10 Reading Test — 完整模拟考</div>
    <div class="t2" id="tbSub">选择一套试卷开始</div>
  </div>
  <div class="stage-progress hidden" id="stageProgress"></div>
  <div class="timer hidden" id="timer">--:--</div>
</div>

<button id="hlBtn" class="hidden">🖍 高亮</button>

<div class="container" id="app"></div>

<script>
/* ============================================================
   题库（全新三套，与旧题不重复）。规格对齐真实 FULL READING TEST：
   Stage1 8题×2分钟(16分)；Stage2 7段/9标题(8分)；
   Stage3 7段A-G/6题(可重复/有未用,11分)；Stage4 6空/7段(14分)。
   ============================================================ */
const TESTS = [
/* ==================== TEST 1 ==================== */
{
  name:"Reading Test 1",
  topics:"深海采矿 · 摩天大楼 · 盐 · 土豆",
  stage1:{
    time:960,
    questions:[
      { q:"What main point is the writer making about deep-sea mining?",
        para:"Thousands of metres below the ocean surface lies a resource that industry has long coveted: potato-sized lumps of rock, scattered across the seabed, that are unusually rich in the metals needed for batteries and electronics. Mining companies argue that gathering these nodules could supply the raw materials for a cleaner, electrified future while avoiding the damage caused by mines on land. Marine scientists are far less certain. The deep sea floor, they point out, is one of the least understood environments on the entire planet, home to strange creatures found nowhere else, and machines scraping it bare could destroy ecosystems we have barely begun to study. The central question, then, is not whether these metals are valuable, but whether we truly understand the cost of taking them.",
        options:{A:"It is the only possible source of the metals batteries need.",B:"Its true environmental cost is still poorly understood.",C:"Its benefits are obvious while its risks are trivial.",D:"It has already destroyed most of the deep sea floor."},
        answer:"B",
        explain:"主旨：这些金属虽有价值，但开采的真实代价我们还不清楚（least understood environment）。A、D 夸大；C 与作者「far less certain」的立场相反。" },
      { q:"What is the writer doing in this passage?",
        para:"Ask most parents and they will tell you, with complete confidence, that sugar makes children hyperactive; the chaos of a birthday party is routinely blamed on the cake. The belief is so widespread that it feels like plain common sense. Yet when researchers have given some children sugary drinks and others identical-tasting drinks containing no sugar at all — without telling anyone which was which — they have found no difference whatever in the children's behaviour. What did differ was the parents' judgement: those who believed their child had been given sugar rated them as noticeably more hyperactive, even when they had not. The famous 'sugar rush', it seems, may live mainly in the minds of the adults doing the watching.",
        options:{A:"explaining the process by which sugar makes children hyperactive",B:"advising parents to avoid serving cake at children's parties",C:"debunking a widely held belief about sugar and behaviour",D:"describing how sugary drinks are manufactured and sold"},
        answer:"C",
        explain:"作者在戳破「糖让孩子亢奋」这一流行误解（found no difference whatever）。A 建立在错误前提上；B、D 均非本段所做的事。" },
      { q:"What would make a good heading for this paragraph?",
        para:"In an age when almost any song ever recorded can be streamed instantly and for free, one old technology has staged a genuinely unlikely comeback. Sales of vinyl records — those large black discs that once seemed destined only for museums — have risen every single year for well over a decade, and now outsell CDs in some countries. Part of the appeal is the warm, slightly imperfect sound; part is the simple pleasure of holding a physical object, with its large artwork and printed sleeve notes, in a world where music has otherwise become invisible. For many buyers, a record is no longer just a way to hear music but a thing to own, display and treasure.",
        options:{A:"The surprising return of a physical format",B:"How vinyl records are manufactured today",C:"Why streaming has ruined the music industry",D:"The best-selling music albums of all time"},
        answer:"A",
        explain:"主旨：一种实体格式意外回归。B、D 与内容无关；C 与文中「comeback」的正面态度相反。" },
      { q:"What is the writer concerned about in this paragraph?",
        para:"It is one of the most ordinary substances imaginable, and yet the world is quietly running short of it. Sand — specifically the angular grains found in riverbeds and on the seabed — is the main ingredient of the concrete and glass from which our cities are built, and we now consume it far faster than rivers can produce it. Desert sand, smoothed and rounded by the wind, is useless for construction, so the pressure falls instead on rivers, beaches and coastlines, which are being stripped away, sometimes illegally, at enormous environmental cost. A resource we have always assumed to be effectively limitless is, without most people noticing, becoming genuinely scarce.",
        options:{A:"the steadily rising cost of building materials in cities",B:"the difficulty of using desert sand for construction",C:"the pollution of rivers by large construction companies",D:"that a resource long assumed limitless is being used up at great cost"},
        answer:"D",
        explain:"作者担忧：一直被当作用之不竭的沙子正在被破坏性地耗尽。A、C 与本段无关；B 只是文中一处细节。" },
      { q:"What main point is the writer making about gig work?",
        para:"Delivering meals, driving passengers, completing small online tasks: millions of people now earn a living through apps that offer work by the job rather than by the hour. Supporters praise the flexibility, the freedom to choose when and how much to work. But this freedom comes with a catch that is easy to overlook. Gig workers are usually classed not as employees but as independent contractors, which means they receive no sick pay, no holiday pay, no pension and very little job security. The flexibility they are offered, in other words, is entirely real — but so is the protection they quietly give up in exchange for it.",
        options:{A:"Gig work is the best kind of employment for most people.",B:"Gig work offers flexibility but at the cost of important protections.",C:"Gig workers reliably earn far more than traditional employees.",D:"Apps should be banned from offering any work by the job."},
        answer:"B",
        explain:"主旨：零工提供灵活性，代价是放弃了重要保障。A、C 与文意不符；D 是作者未提出的极端主张。" },
      { q:"What can be concluded from this paragraph?",
        para:"A dog's nose is a truly remarkable instrument. Where humans have around five million scent receptors, a dog may have three hundred million, and a far larger part of its brain is devoted to interpreting what it smells. Trained dogs can already detect explosives and drugs, and in carefully controlled trials some have identified samples from patients with certain cancers more accurately than existing laboratory tests. Researchers now wonder whether dogs are responding to faint chemical traces that our machines simply cannot yet detect — and whether, by studying exactly what the animals are sensing, we might one day build instruments that finally match them.",
        options:{A:"Dogs will soon completely replace all medical laboratories.",B:"Machines are already far better than dogs at detecting cancer.",C:"A dog's sense of smell may point the way to new detection tools.",D:"Humans actually have more scent receptors than dogs do."},
        answer:"C",
        explain:"可推断：研究狗的嗅觉或能启发新的检测工具。A 夸大；B、D 与文中事实相反。" },
      { q:"How does the writer feel about editing the genes of human embryos?",
        para:"The ability to edit the genes of a human embryo, once pure science fiction, is now technically within reach, and its potential is genuinely dazzling: inherited diseases that have caused suffering for generations might simply be switched off before birth. And yet I find it hard to share the excitement entirely without reservation. The very same tools that could erase a fatal illness could, in principle, be used to select for height, intelligence or appearance, and the line between healing and enhancement is far blurrier than its most eager enthusiasts admit. Before we rush to rewrite the human blueprint, we would do well to ask not only what we can do, but who exactly gets to decide what counts as an improvement.",
        options:{A:"wholeheartedly enthusiastic about all of its possible uses",B:"convinced that it should never even be researched",C:"impressed by its promise but uneasy about its wider use",D:"completely indifferent to the ethical questions it raises"},
        answer:"C",
        explain:"作者被其医疗前景打动（dazzling），却对「治疗与增强」的界限感到不安。A 过度肯定；B 过度否定；D 与全段的伦理关切相反。" },
      { q:"What is the writer doing in this passage?",
        para:"Roughly every two weeks, somewhere in the world, the last fluent speaker of a language dies, and with them an entire way of describing the world quietly disappears. It is tempting to see this as sad but ultimately unimportant — a natural thinning-out that leaves us with a few convenient global languages. That comfortable view, however, misses what is actually being lost. Each language carries knowledge accumulated over centuries — of local plants, weather, navigation and history — encoded in words that often have no equivalent anywhere else. When a language falls silent, we do not simply lose a set of unfamiliar sounds; we lose a unique library that no one ever thought to copy.",
        options:{A:"challenging the idea that the loss of languages does not matter",B:"explaining the ordinary ways in which languages change over time",C:"arguing that a few global languages would be far more convenient",D:"describing which languages are currently the most widely spoken"},
        answer:"A",
        explain:"作者在反驳「语言消失无关紧要」的看法（That comfortable view misses...）。C 正是作者要驳斥的观点；B、D 均非本段所做的事。" }
    ]
  },
  stage2:{
    time:480,
    title:"Reaching for the Sky: The Story of the Skyscraper",
    headings:{
      i:"The drawbacks felt at street level",
      ii:"An old ambition once held back by materials",
      iii:"Making tall buildings greener",
      iv:"Why costly land pushed buildings upward",
      v:"Two inventions that made great height possible",
      vi:"An ambition unlikely ever to fade",
      vii:"More than space: a symbol of pride",
      viii:"How to design a small house with a garden",
      ix:"Why cities ought to ban all tall buildings"
    },
    sections:{
      A:"There is something in the human spirit that has always wanted to build upwards. Yet for most of history, height was strictly limited by the materials available. A tall stone building had to have immensely thick walls at its base to carry the enormous weight above, which made truly tall structures impractical. The skyscraper, as we know it, simply could not exist until that basic problem was solved.",
      B:"The breakthrough came in the late nineteenth century with the steel frame. Instead of thick walls supporting the building, a skeleton of steel beams now carried the load, and the walls became a thin skin hung from the frame. Suddenly buildings could rise far higher without becoming impossibly heavy at the bottom. A second invention was just as important: the safe passenger lift, which at last made the upper floors of a tall building practical to reach.",
      C:"Skyscrapers did not appear everywhere at once. They rose first in cities such as Chicago and New York, where land in the very centre was extraordinarily expensive and business was booming. When a small plot of ground costs a fortune, the only way to get more usable space out of it is to build upwards. Height, in these cities, was as much a matter of economics as of engineering.",
      D:"Almost from the beginning, tall buildings were about more than space. A soaring tower announced the wealth and ambition of the company that built it, and cities and corporations competed fiercely to raise the tallest structure in the world. This race has never really stopped; today the record passes between ever-taller towers in the Middle East and Asia, each one a statement of national confidence.",
      E:"Not everyone has admired the results. Critics argue that clusters of tall towers cast whole streets into permanent shadow, funnel fierce winds down to ground level, and can leave the areas around them feeling cold and inhuman. A city of giants, they warn, can be a distinctly uncomfortable place for the ordinary people walking about at its feet.",
      F:"Modern skyscrapers face a further challenge: energy. A glass tower can trap heat like a greenhouse, demanding enormous amounts of power to keep cool. In response, architects now design buildings that shade themselves, open to catch passing breezes, and even generate some of their own energy, in an effort to make height sustainable as well as impressive.",
      G:"Whether we should keep building upwards at all is a question that will only grow louder. Supporters argue that concentrating people in tall buildings saves land and shortens journeys; opponents reply that we could live perfectly well without towers at all. What seems certain is that, as long as land is scarce and human ambition is not, the urge to reach for the sky will endure."
    },
    answers:{A:"ii",B:"v",C:"iv",D:"vii",E:"i",F:"iii",G:"vi"},
    explanations:{
      A:"过去建筑的高度受材料限制（an old ambition held back by materials）。",
      B:"两项发明——钢架 + 安全电梯——让高度成为可能。",
      C:"中心地价昂贵，把建筑逼向高空（costly land）。",
      D:"高楼不只为空间，更是财富与野心的象征。",
      E:"高楼在街道层面的弊端（阴影、强风、冷漠）。",
      F:"让高楼更环保（自遮阳、通风、自发电）。",
      G:"只要土地稀缺、野心不减，向上建的冲动就不会消退。"
    },
    distractors:{
      viii:"「如何设计带花园的小房子」与摩天楼主题无关，是操作指南。",
      ix:"「城市应禁止一切高楼」——G 段只是提到有反对者，并未主张全面禁止。"
    }
  },
  stage3:{
    time:660,
    title:"Salt: The Rock That Shaped History",
    sections:{
      A:"Salt is so cheap and common today that it is easy to forget how precious it once was. Yet the human body cannot live without it: salt helps our nerves fire, our muscles move and our bodies hold the right amount of water. For most of history, obtaining enough salt was a matter of sheer survival, and societies organised themselves around finding, trading and controlling it.",
      B:"Salt was gathered in two main ways. In hot, dry regions near the sea, people channelled seawater into shallow ponds and let the sun evaporate it, leaving the salt behind. Elsewhere, salt was dug or pumped up as brine from underground deposits — the remains of ancient seas — and boiled until only the salt remained. Both methods demanded great effort, which is part of why salt was so valuable.",
      C:"Before refrigeration, salt was the main way of keeping food from rotting. Meat and fish packed in salt could be stored for months and carried over long distances, which meant that armies could be fed on campaign and cities supplied right through the winter. Whole industries, and even the fortunes of entire nations, rested on the humble ability of salt to preserve food.",
      D:"Because it was both essential and hard to obtain, salt was often treated almost as money. Roman soldiers, it is said, were partly paid in salt, and our very word 'salary' comes from the Latin word for it. Rulers throughout history taxed salt heavily, knowing that people had no choice but to buy it, and such taxes filled treasuries for centuries.",
      E:"That same dependence made salt a powerful tool of protest. When a government controls something that everyone needs, controlling it becomes a form of power — and resisting that control becomes a form of rebellion. In 1930, Mahatma Gandhi led thousands of people on a long march to the sea to make their own salt in open defiance of British taxes, a simple act that became a symbol of resistance across India.",
      F:"The salt trade also shaped the map itself. Ancient roads were built specifically to carry salt from where it was made to where it was needed, and towns grew up along these routes to serve the passing traders. Some of the great cities of Europe and Africa owe their original wealth to their position on a salt road, though few of their inhabitants remember it today.",
      G:"In the modern world, salt has lost its old value. Industrial methods now produce it so cheaply, and in such vast quantity, that it is among the least expensive things we can buy, scattered on icy roads by the tonne. The mineral that once shaped empires and sparked rebellions has become, quietly, one more thing we take entirely for granted."
    },
    statements:[
      {text:"an explanation of how salt allowed food to be stored and moved",answer:"C",explain:"C 段：盐能防腐，使肉鱼可久存、远运，供养军队和城市。"},
      {text:"an example of salt at the centre of a political protest",answer:"E",explain:"E 段：1930 年甘地率众向海边进军制盐，反抗英国盐税。"},
      {text:"an explanation of why the human body needs salt",answer:"A",explain:"A 段：盐帮助神经放电、肌肉运动、维持体内水分。"},
      {text:"the origin of a common English word",answer:"D",explain:"D 段：单词 'salary' 源自拉丁语中的「盐」。"},
      {text:"a description of two ways in which salt was produced",answer:"B",explain:"B 段：晒海水成盐 + 抽取地下卤水煮盐。"},
      {text:"mention of salt once being used almost as money",answer:"D",explain:"D 段（再次）：罗马士兵部分以盐支薪，盐几乎被当作货币（与第 4 题同段的不同信息）。"}
    ],
    usedNote:"D 段被用了两次；F、G 段没有用到——与真实考试「部分可重复、部分用不到」一致。"
  },
  stage4:{
    time:840,
    title:"How the Potato Changed the World",
    segments:[
      {t:"text",c:"Few foods have changed history as quietly as the potato. Today it is one of the world's most important crops, grown on every inhabited continent. Yet when it first arrived in Europe, it was met not with gratitude but with deep suspicion."},
      {t:"gap",n:1},
      {t:"text",c:"The potato came originally from the high Andes of South America, where farmers had grown hundreds of different varieties for thousands of years. Spanish explorers carried it back to Europe in the sixteenth century, more as a curiosity than as anything to eat."},
      {t:"gap",n:2},
      {t:"text",c:"At first, Europeans wanted very little to do with it. The potato grew underground, in the dark, and belonged to the same plant family as several poisonous species. Many people were convinced it was unfit to eat, or even that it caused disease."},
      {t:"gap",n:3},
      {t:"text",c:"Gradually, however, attitudes began to change. Rulers and reformers, increasingly worried about how to feed growing populations, started actively promoting the potato. It could produce far more food from a given piece of land than grain, and it grew even in poor soils where little else would."},
      {t:"gap",n:4},

const STAGE_KEYS = ["stage1","stage2","stage3","stage4"];
const STAGE_NAMES = {
  stage1:"Stage 1 · Short Paragraphs（短段落）",
  stage2:"Stage 2 · Matching Headings（段落配标题）",
  stage3:"Stage 3 · Locating Information（信息定位）",
  stage4:"Stage 4 · Gapped Text（段落填空）"
};

/* ==================== 状态 ==================== */
let testIndex=0, stageIdx=0;
let timerInterval=null, secondsLeft=0;
let responses={};
const $=id=>document.getElementById(id);
const app=()=>$("app");

/* ==================== 计时 ==================== */
function startTimer(seconds,onEnd){
  clearInterval(timerInterval);
  secondsLeft=seconds; renderTimer();
  $("timer").classList.remove("hidden");
  timerInterval=setInterval(()=>{
    secondsLeft--; renderTimer();
    if(secondsLeft<=0){clearInterval(timerInterval); onEnd();}
  },1000);
}
function renderTimer(){
  const m=Math.floor(secondsLeft/60), s=secondsLeft%60;
  const el=$("timer");
  el.textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  el.classList.toggle("warning",secondsLeft<=60&&secondsLeft>15);
  el.classList.toggle("danger",secondsLeft<=15);
}
function stopTimer(){clearInterval(timerInterval);$("timer").classList.add("hidden");}

/* ==================== 进度点 ==================== */
function renderProgress(){
  const sp=$("stageProgress");
  sp.classList.remove("hidden");
  sp.innerHTML=[1,2,3,4].map((n,i)=>{
    let cls="dot"; if(i<stageIdx)cls+=" done"; if(i===stageIdx)cls+=" active";
    return `<div class="${cls}">${i<stageIdx?"✓":n}</div>`;
  }).join("");
}

/* ==================== 首页 ==================== */
function renderHome(){
  stopTimer();
  $("stageProgress").classList.add("hidden");
  $("tbTitle").textContent="BE10 Reading Test — 完整模拟考";
  $("tbSub").textContent="选择一套试卷开始";
  let cards=TESTS.map((t,i)=>`
    <div class="test-card" onclick="startTest(${i})">
      <h3>${t.name}</h3>
      <div class="muted" style="font-size:13px">${t.topics}</div>
      <ul>

      </ul>
      <p style="margin:14px 0 0"><button class="primary" style="width:100%">开始 ▶</button></p>

  app().innerHTML=`
    <div class="card">
      <h1>BE10 Reading 完整模拟考</h1>
      <p class="muted">三套试卷，每套都是完整的四阶段考试，按官方计时依次进行；全程可用鼠标选中文字 🖍 高亮。</p>

      </div>
      <div class="test-cards">${cards}</div>
    </div>`;
}

function startTest(i){
  testIndex=i; stageIdx=0; responses={};
  $("tbTitle").textContent=TESTS[i].name;
  runStage();
}

/* ==================== 运行某一 Stage ==================== */
function runStage(){
  const key=STAGE_KEYS[stageIdx];
  renderProgress();
  $("tbSub").textContent=STAGE_NAMES[key];
  const st=TESTS[testIndex][key];
  if(key==="stage1")renderStage1(st);
  else if(key==="stage2")renderStage2(st);
  else if(key==="stage3")renderStage3(st);
  else renderStage4(st);
  startTimer(st.time,()=>submitStage(true));
  window.scrollTo(0,0);
}

function nextBtn(){
  return `<div class="card center">
    <button class="primary" onclick="submitStage(false)">提交本部分并继续 ✓</button>
    <div class="muted" style="margin-top:8px">未作答的题会记为错。时间到会自动提交。</div>
  </div>`;
}

/* ---------- Stage 1 ---------- */
function renderStage1(st){
  let qs=st.questions.map((q,idx)=>{
    const opts=Object.entries(q.options).map(([k,v])=>`
      <label class="opt" data-q="${idx}" data-v="${k}">
        <input type="radio" name="s1q${idx}" value="${k}" onchange="selOpt(${idx},'${k}')">
        <b>${k}.</b> ${v}
      </label>`).join("");
    return `<div class="q-block">
      <div class="q-stem"><span class="q-num">Question ${idx+1}.</span> ${q.q}</div>
      <p class="para">${q.para}</p>
      ${opts}
    </div>`;
  }).join("");
  app().innerHTML=`
    <div class="card">
      <h2>${STAGE_NAMES.stage1}</h2>
      <p class="muted">阅读每个独立的短段落，选出最能回答问题的一项。共 8 题，每题约 2 分钟（本部分共 16 分钟）。</p>

    </div>
    <div class="card highlightable">${qs}</div>
    ${nextBtn()}`;
}
function selOpt(idx,k){
  document.querySelectorAll(`.opt[data-q="${idx}"]`).forEach(o=>o.classList.toggle("sel",o.dataset.v===k));
}

          <div id="s2rows">${rows}</div>
          <div class="dup-warn hidden" id="s2dup">⚠️ 有标题被重复使用（每个标题只能用一次）</div>
          <div class="card" style="padding:12px 14px;margin:14px 0 0;background:#faf8fd;box-shadow:none">
            <b style="color:var(--purple)">List of Headings</b>
            <div class="highlightable" style="font-size:13px;margin-top:6px">${headingsListHTML(st.headings)}</div>
          </div>
        </div>
      </div>
    </div>
    ${nextBtn()}`;
}
function short(s){return s.length>32?s.slice(0,32)+"…":s;}

/* ---------- Stage 3 ---------- */
function renderStage3(st){
  const letters=Object.keys(st.sections);
  const passage=Object.entries(st.sections).map(([l,t])=>
    `<div class="section-block"><span class="section-letter">${l}.</span>${t}</div>`).join("");
  const stmts=st.statements.map((s,i)=>`
    <div class="stmt">
      <select data-st="${i}">
        <option value="">?</option>
        ${letters.map(l=>`<option value="${l}">${l}</option>`).join("")}
      </select>
      <div class="highlightable"><b>${i+1}.</b> ${s.text}</div>
    </div>`).join("");
  app().innerHTML=`
    <div class="card">
      <h2>${STAGE_NAMES.stage3}</h2>
      <p class="muted">文章分 7 个部分 A–G。判断下列信息各出现在哪个部分。<b>同一字母可重复使用，也有部分用不到</b>。共 6 题。</p>
      <p class="hl-tip">🖍 文章和下面的信息句都可以选中高亮关键词。</p>
    </div>
    <div class="grid2">
      <div class="card passage highlightable">
        <h2 style="font-size:20px">${st.title}</h2>${passage}
      </div>
      <div>
        <div class="card side">
          <h2>信息定位</h2>
          <p class="muted" style="margin-top:0">选择包含该信息的部分：</p>
          ${stmts}
        </div>
      </div>
    </div>
    ${nextBtn()}`;
}

/* ---------- Stage 4 ---------- */
function renderStage4(st){
  const letters=Object.keys(st.options);
  const body=st.segments.map(seg=>{
    if(seg.t==="text")return `<p class="para">${seg.c}</p>`;
    return `<div class="gap-slot">
      <label>Gap ${seg.n}</label>
      <select data-gap="${seg.n}" onchange="checkDupSelect('#s4body','gap')">
        <option value="">— 选择段落 —</option>
        ${letters.map(l=>`<option value="${l}">${l}</option>`).join("")}
      </select>
    </div>`;
  }).join("");
  const opts=Object.entries(st.options).map(([l,t])=>
    `<li><span class="ol">${l}</span>${t}</li>`).join("");
  app().innerHTML=`
    <div class="card">
      <h2>${STAGE_NAMES.stage4}</h2>
      <p class="muted">文章中抽走了 6 个段落。从 A–G 中为每个空缺选择最合适的段落，有 1 个段落不会用到。</p>
      <p class="hl-tip">🖍 可选中文字高亮衔接线索（连接词、指代词、重复的关键词）。</p>
    </div>
    <div class="grid2">
      <div class="card highlightable" id="s4body">
        <h2 style="font-size:20px">${st.title}</h2>${body}
      </div>
      <div>
        <div class="card side">
          <h2>可选段落</h2>
          <div class="dup-warn hidden" id="s4dup">⚠️ 有段落被重复使用（每个段落只能填一个空）</div>
          <ul class="opt-list highlightable">${opts}</ul>
        </div>
      </div>
    </div>
    ${nextBtn()}`;
}

/* 重复选择检测（用于 stage2 与 stage4） */
function checkDupSelect(scope,attr){
  const sels=document.querySelectorAll(`${scope} select`);
  const counts={};
  sels.forEach(s=>{if(s.value)counts[s.value]=(counts[s.value]||0)+1;});
  let dup=false;
  sels.forEach(s=>{const d=s.value&&counts[s.value]>1;s.classList.toggle("dup",d);if(d)dup=true;});
  const warn=scope==="#s4body"?$("s4dup"):$("s2dup");
  if(warn)warn.classList.toggle("hidden",!dup);
}

/* ==================== 收集答案并推进 ==================== */
function collectStage(){
  const key=STAGE_KEYS[stageIdx];
  const st=TESTS[testIndex][key];
  if(key==="stage1"){
    const a={};
    st.questions.forEach((q,i)=>{const c=document.querySelector(`input[name="s1q${i}"]:checked`);a[i]=c?c.value:"";});
    responses.stage1=a;
  }else if(key==="stage2"){
    const a={};
    document.querySelectorAll('#s2rows select').forEach(s=>a[s.dataset.sec]=s.value);
    responses.stage2=a;
  }else if(key==="stage3"){
    const a={};
    document.querySelectorAll('.stmt select').forEach(s=>a[s.dataset.st]=s.value);
    responses.stage3=a;
  }else{
    const a={};
    document.querySelectorAll('#s4body select').forEach(s=>a[s.dataset.gap]=s.value);
    responses.stage4=a;
  }
}
function submitStage(auto){
  collectStage();
  stageIdx++;
  if(stageIdx<4){ runStage(); }
  else { stopTimer(); renderResults(); }
}

/* ==================== 结果 ==================== */
function gradeStage1(st){
  let c=0; st.questions.forEach((q,i)=>{if((responses.stage1[i]||"")===q.answer)c++;});
  return c;
}
function gradeMap(answers,resp){
  let c=0; for(const k in answers){if((resp[k]||"")===answers[k])c++;} return c;
}
function renderResults(){
  const T=TESTS[testIndex];
  $("stageProgress").classList.add("hidden");
  $("tbSub").textContent="已完成 · 查看结果";
  const s1=gradeStage1(T.stage1);
  const s2=gradeMap(T.stage2.answers,responses.stage2);
  let s3=0; T.stage3.statements.forEach((s,i)=>{if((responses.stage3[i]||"")===s.answer)s3++;});
  const s4=gradeMap(T.stage4.answers,responses.stage4);
  const total=s1+s2+s3+s4;

  let t1=T.stage1.questions.map((q,i)=>{
    const y=responses.stage1[i]||"—", ok=y===q.answer;
    return `<tr><td class="center"><b>${i+1}</b></td>
      <td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${q.answer}</b></td>
      <td>${q.explain}</td></tr>`;
  }).join("");

  let t2=Object.keys(T.stage2.sections).map(l=>{
    const y=responses.stage2[l]||"—", corr=T.stage2.answers[l], ok=y===corr;
    return `<tr><td class="center"><b>${l}</b></td>
      <td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${corr}</b>. ${short(T.stage2.headings[corr])}</td>
      <td>${T.stage2.explanations[l]}</td></tr>`;
  }).join("");
  let d2=Object.entries(T.stage2.distractors).map(([k,v])=>`<p><b style="color:var(--purple)">${k}.</b> ${T.stage2.headings[k]} — ${v}</p>`).join("");

  let t3=T.stage3.statements.map((s,i)=>{
    const y=responses.stage3[i]||"—", ok=y===s.answer;
    return `<tr><td class="center"><b>${i+1}</b></td>
      <td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${s.answer}</b></td>
      <td>${s.text}<br><span class="muted">${s.explain}</span></td></tr>`;
  }).join("");

  let t4=Object.keys(T.stage4.answers).map(n=>{
    const y=responses.stage4[n]||"—", corr=T.stage4.answers[n], ok=y===corr;
    return `<tr><td class="center"><b>Gap ${n}</b></td>
      <td class="center ${ok?'ok':'bad'}">${y} ${ok?'✓':'✗'}</td>
      <td class="center"><b>${corr}</b></td>
      <td>${T.stage4.explanations[n]}</td></tr>`;
  }).join("");

  app().innerHTML=`
    <div class="card">
      <h1 style="text-align:center">${T.name} · 成绩</h1>
      <div class="score-big">${total} / 27</div>
      <div class="stage-scores">
        <div class="ss"><b>${s1}/8</b><span>Stage 1</span></div>
        <div class="ss"><b>${s2}/7</b><span>Stage 2</span></div>
        <div class="ss"><b>${s3}/6</b><span>Stage 3</span></div>
        <div class="ss"><b>${s4}/6</b><span>Stage 4</span></div>
      </div>
      <p class="center" style="margin-top:18px">
        <button class="primary" onclick="startTest(${testIndex})">重做本套 ↺</button>
        <button class="ghost" onclick="renderHome()" style="margin-left:10px">返回选卷</button>
      </p>
    </div>

    <div class="card">
      <h2>Stage 1 · Short Paragraphs</h2>
      <table class="results"><thead><tr><th>题号</th><th>你的答案</th><th>正确</th><th>解析</th></tr></thead><tbody>${t1}</tbody></table>
    </div>

    <div class="card">
      <h2>Stage 2 · Matching Headings</h2>
      <p class="muted">${T.stage2.title}</p>
      <table class="results"><thead><tr><th>段落</th><th>你的答案</th><th>正确标题</th><th>解析</th></tr></thead><tbody>${t2}</tbody></table>
      <h3>两个干扰标题为什么错</h3>${d2}
    </div>

    <div class="card">
      <h2>Stage 3 · Locating Information</h2>
      <p class="muted">${T.stage3.title}</p>
      <table class="results"><thead><tr><th>题号</th><th>你的答案</th><th>正确</th><th>信息 / 解析</th></tr></thead><tbody>${t3}</tbody></table>
      <p class="muted" style="margin-top:8px">${T.stage3.usedNote||""}</p>
    </div>

    <div class="card">
      <h2>Stage 4 · Gapped Text</h2>
      <p class="muted">${T.stage4.title}（未使用的段落：<b>${T.stage4.unused}</b>）</p>
      <table class="results"><thead><tr><th>空缺</th><th>你的答案</th><th>正确</th><th>衔接解析</th></tr></thead><tbody>${t4}</tbody></table>
      <p class="muted" style="margin-top:8px">${T.stage4.explanations.unused}</p>
    </div>`;
  window.scrollTo(0,0);
}

/* ==================== 高亮 ==================== */
const hlBtn=$("hlBtn"); let savedRange=null;
document.addEventListener("mouseup",e=>{
  if(e.target===hlBtn)return;
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount){hlBtn.classList.add("hidden");return;}
    const range=sel.getRangeAt(0);
    const cont=range.commonAncestorContainer;
    const el=cont.nodeType===3?cont.parentElement:cont;
    if(!el||!el.closest(".highlightable")){hlBtn.classList.add("hidden");return;}
    savedRange=range.cloneRange();
    const r=range.getBoundingClientRect();
    hlBtn.style.top=(window.scrollY+r.top-38)+"px";
    hlBtn.style.left=(window.scrollX+r.left+r.width/2-34)+"px";
    hlBtn.classList.remove("hidden");
  },10);
});
hlBtn.addEventListener("click",()=>{
  if(savedRange)highlightRange(savedRange);
  hlBtn.classList.add("hidden");
  window.getSelection().removeAllRanges(); savedRange=null;
});
document.addEventListener("click",e=>{
  const mark=e.target.closest("mark.hl");
  if(mark&&(!window.getSelection()||window.getSelection().isCollapsed)){
    const p=mark.parentNode;
    while(mark.firstChild)p.insertBefore(mark.firstChild,mark);
    p.removeChild(mark); p.normalize();
  }
});
function highlightRange(range){
  if(range.collapsed)return;
  const root=range.commonAncestorContainer.nodeType===3?range.commonAncestorContainer.parentElement:range.commonAncestorContainer;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
    acceptNode(node){
      if(!range.intersectsNode(node))return NodeFilter.FILTER_REJECT;
      if(node.parentElement.closest("mark.hl"))return NodeFilter.FILTER_REJECT;
      if(!node.parentElement.closest(".highlightable"))return NodeFilter.FILTER_REJECT;
      if(!node.textContent.trim())return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes=[]; while(walker.nextNode())nodes.push(walker.currentNode);
  for(const node of nodes){
    let start=0,end=node.textContent.length;
    if(node===range.startContainer)start=range.startOffset;
    if(node===range.endContainer)end=range.endOffset;
    if(start>=end)continue;
    const middle=start>0?node.splitText(start):node;
    if(end-start<middle.textContent.length)middle.splitText(end-start);
    const mark=document.createElement("mark"); mark.className="hl";
    middle.parentNode.insertBefore(mark,middle); mark.appendChild(middle);
  }
}

/* ==================== 启动 ==================== */
renderHome();
</script>
</body>
